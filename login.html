<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Reem Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 20px;
            padding: 50px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .login-title {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #bdc3c7;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #ecf0f1;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 8px;
            color: #ecf0f1;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
            box-shadow: 0 0 15px rgba(102,126,234,0.2);
        }

        input::placeholder {
            color: rgba(236,240,241,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-accounts {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            font-size: 12px;
            color: #bdc3c7;
        }

        .demo-accounts h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .demo-account {
            padding: 8px 0;
            border-bottom: 1px solid rgba(102,126,234,0.1);
        }

        .demo-account:last-child {
            border-bottom: none;
        }

        .demo-account strong {
            color: #ecf0f1;
        }

        .error-message {
            background: rgba(245,87,108,0.2);
            border: 1px solid #f5576c;
            color: #f5576c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }

        .error-message.show {
            display: block;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">⏰</div>
            <h1 class="login-title">Reem Team</h1>
            <p class="login-subtitle">نظام الحضور والانصراف الذكي</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">اسم المستخدم:</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="أدخل اسم المستخدم"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور:</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="أدخل كلمة المرور"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">تذكرني</label>
            </div>

            <button type="submit" class="login-btn">تسجيل الدخول</button>
        </form>

        <div class="demo-accounts">
            <h4>🔐 حسابات تجريبية:</h4>
            <div class="demo-account">
                <strong>المسؤول:</strong> admin / admin123
            </div>
            <div class="demo-account">
                <strong>المدير:</strong> manager / manager123
            </div>
            <div class="demo-account">
                <strong>الموارد البشرية:</strong> hr / hr123
            </div>
        </div>
    </div>

    <script>
        // Demo accounts
        const accounts = {
            'admin': 'admin123',
            'manager': 'manager123',
            'hr': 'hr123'
        };

        // Handle login
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMessage = document.getElementById('errorMessage');

            // Validate credentials
            if (accounts[username] && accounts[username] === password) {
                // Save to localStorage if remember me is checked
                if (rememberMe) {
                    localStorage.setItem('username', username);
                    localStorage.setItem('rememberMe', 'true');
                }

                // Store current session
                sessionStorage.setItem('currentUser', username);
                localStorage.setItem('username', username);

                // Redirect to dashboard
                window.location.href = 'index.html';
            } else {
                // Show error message
                errorMessage.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
                errorMessage.classList.add('show');

                // Clear password field
                document.getElementById('password').value = '';

                // Hide error after 5 seconds
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 5000);
            }
        }

        // Check if user is already logged in
        window.onload = function() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (currentUser) {
                window.location.href = 'index.html';
            }

            // Check if remember me was enabled
            const rememberMe = localStorage.getItem('rememberMe');
            if (rememberMe === 'true') {
                const username = localStorage.getItem('username');
                if (username) {
                    document.getElementById('username').value = username;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        }

        // Allow Enter key to submit form
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                document.querySelector('form').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
