<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REEM Enterprise ERP v10</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --gold: #d4af37; --blue: #020c1b; --glass: rgba(16, 33, 65, 0.95); --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at center, #112240, #020c1b); color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        /* Glass UI & 3D Effects */
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .sidebar { width: 280px; position: fixed; height: 100vh; right: 0; background: #000; border-left: 1px solid var(--gold); padding: 20px; z-index: 1000; }
        .main { margin-right: 280px; padding: 30px; transition: 0.3s; }
        
        /* Luxury Clock & News Bar */
        .reem-clock { background: #000; border: 1px solid var(--gold); padding: 10px 25px; border-radius: 50px; font-size: 22px; color: var(--gold); text-shadow: 0 0 10px var(--gold); display: inline-block; }
        .news-ticker { background: var(--gold); color: #000; padding: 8px; font-weight: bold; overflow: hidden; white-space: nowrap; margin-bottom: 20px; border-radius: 10px; }
        .news-text { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        /* Tables & Inputs */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--gold); padding: 12px; border-bottom: 2px solid var(--gold); text-align: right; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: right; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--gold); border-radius: 10px; color: white; }
        .btn-pro { background: linear-gradient(135deg, #d4af37, #f9d976); color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.3s; }
        
        /* Map & Photos */
        #map { height: 400px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 20px; }
        .emp-photo { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; }
        
        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main { margin-right: 0; } }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; z-index:9999; background:var(--blue); display:flex; align-items:center; justify-content:center;">
    <div class="glass-card" style="width:380px; text-align:center; border:2px solid var(--gold);">
        <h1 style="color:var(--gold); margin-bottom:20px;">REEM ENTERPRISE</h1>
        <input type="text" id="u_in" placeholder="اسم المستخدم">
        <input type="password" id="p_in" placeholder="كلمة المرور">
        <button class="btn-pro" onclick="login()">دخول آمن</button>
    </div>
</div>

<aside class="sidebar">
    <div style="text-align:center; margin-bottom:30px;"><h2 style="color:var(--gold);">REEM ERP</h2></div>
    <div id="nav-box"></div>
    <button class="btn-pro" style="background:var(--danger); color:white; margin-top:50px;" onclick="location.reload()">تسجيل خروج</button>
</aside>

<main class="main">
    <div class="news-ticker"><div class="news-text" id="news-val">مرحباً بكم في نظام شركة ريم المتكامل - يرجى تسجيل الحضور عبر GPS</div></div>
    <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
        <div id="clock" class="reem-clock">00:00:00</div>
        <h2 id="page-title" style="color:var(--gold);">لوحة التحكم</h2>
    </div>
    <div id="dynamic-area"></div>
</main>

<script>
    // قاعدة البيانات الشاملة
    let db = JSON.parse(localStorage.getItem('reem_v10')) || {
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام", dept: "الإدارة", sal: 0, photo: ""}],
        depts: ["إدارة", "مبيعات", "ميدان"],
        logs: [],
        news: "مرحباً بكم في شركة ريم - نظام تتبع الموظفين مفعل"
    };

    let session = null;
    function sync() { localStorage.setItem('reem_v10', JSON.stringify(db)); }

    function login() {
        const u = document.getElementById('u_in').value.trim();
        const p = document.getElementById('p_in').value.trim();
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) { 
            session = found; document.getElementById('auth-screen').style.display='none'; 
            renderNav(); loadView('dash');
        } else { alert("بيانات خاطئة!"); }
    }

    function renderNav() {
        const n = document.getElementById('nav-box');
        if(session.role === 'admin') {
            n.innerHTML = `
                <div class="btn-pro" onclick="loadView('dash')" style="margin-bottom:10px">الإحصائيات</div>
                <div class="btn-pro" onclick="loadView('hr')" style="margin-bottom:10px">الموظفين والأقسام</div>
                <div class="btn-pro" onclick="loadView('tracking')" style="margin-bottom:10px">تتبع GPS المباشر</div>
                <div class="btn-pro" onclick="loadView('finance')" style="margin-bottom:10px">الرواتب والتقارير</div>
                <div class="btn-pro" onclick="backup()" style="background:#2ecc71; color:white; margin-top:20px">نسخة احتياطية</div>
                <input type="file" id="restore-file" style="display:none" onchange="restore(event)">
                <div class="btn-pro" onclick="document.getElementById('restore-file').click()" style="background:var(--gold); color:black; margin-top:10px">استرداد البيانات</div>
            `;
        } else {
            n.innerHTML = `
                <div class="btn-pro" onclick="loadView('emp_punch')" style="margin-bottom:10px">بصمة GPS</div>
                <div class="btn-pro" onclick="loadView('emp_info')" style="margin-bottom:10px">ملفي الشخصي</div>
            `;
        }
    }

    function loadView(v) {
        const area = document.getElementById('dynamic-area');
        if(v === 'dash') {
            area.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px">
                    <div class="glass-card"><h4>الموظفين</h4><h2>${db.users.length-1}</h2></div>
                    <div class="glass-card"><h4>بصمات اليوم</h4><h2>${db.logs.length}</h2></div>
                    <div class="glass-card"><h4>الأقسام</h4><h2>${db.depts.length}</h2></div>
                </div>
            `;
        } else if(v === 'hr') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>إدارة الأقسام</h3>
                    <input id="new-dept" placeholder="اسم القسم الجديد"><button class="btn-pro" onclick="addDept()">إضافة قسم</button>
                    <p style="margin-top:10px">الأقسام: ${db.depts.join(' - ')}</p>
                </div>
                <div class="glass-card">
                    <h3>إضافة موظف (مع صورة وراتب)</h3>
                    <input id="n-name" placeholder="الاسم الكامل">
                    <input id="n-user" placeholder="اسم المستخدم">
                    <input id="n-pass" placeholder="كلمة المرور">
                    <input id="n-sal" type="number" placeholder="الراتب الشهري">
                    <select id="n-dept">${db.depts.map(d=>`<option>${d}</option>`)}</select>
                    <input type="file" id="n-photo" accept="image/*">
                    <button class="btn-pro" onclick="addUser()">حفظ الموظف</button>
                </div>
            `;
        } else if(v === 'emp_punch') {
            area.innerHTML = `
                <div class="glass-card" style="text-align:center">
                    <i class="fas fa-fingerprint" style="font-size:80px; color:var(--gold); margin-bottom:20px"></i>
                    <h2>نظام البصمة الجغرافي</h2>
                    <button class="btn-pro" style="height:80px; font-size:1.5rem" onclick="punch()">تسجيل الحضور (GPS)</button>
                    <p id="gps-stat" style="margin-top:15px; color:var(--gold)"></p>
                </div>
            `;
        } else if(v === 'tracking') {
            area.innerHTML = `<div class="glass-card"><h3>خريطة تتبع الموظفين</h3><div id="map"></div></div>`;
            setTimeout(initMap, 500);
        } else if(v === 'finance') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>كشف الرواتب الذكي</h3>
                    <table><thead><tr><th>الموظف</th><th>الراتب</th><th>أيام العمل</th><th>المستحق</th></tr></thead>
                    <tbody>${db.users.filter(u=>u.role!=='admin').map(u=>{
                        const days = db.logs.filter(l=>l.name === u.name).length;
                        return `<tr><td>${u.name}</td><td>${u.sal}</td><td>${days}</td><td>${(u.sal/30 * days).toFixed(2)}</td></tr>`;
                    }).join('')}</tbody></table>
                </div>
            `;
        }
    }

    function punch() {
        document.getElementById('gps-stat').innerText = "جاري التحقق من موقعك...";
        navigator.geolocation.getCurrentPosition(pos => {
            db.logs.push({name: session.name, time: new Date().toLocaleString(), lat: pos.coords.latitude, lng: pos.coords.longitude});
            sync(); alert("تم تسجيل حضورك بنجاح"); document.getElementById('gps-stat').innerText = "موقعك موثق ✅";
        }, () => alert("خطأ! يجب تفعيل GPS الجوال"));
    }

    function initMap() {
        const map = L.map('map').setView([24.7136, 46.6753], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        db.logs.forEach(l => { L.marker([l.lat, l.lng]).addTo(map).bindPopup(`${l.name}<br>${l.time}`); });
    }

    function addUser() {
        const name = document.getElementById('n-name').value;
        const user = document.getElementById('n-user').value;
        const pass = document.getElementById('n-pass').value;
        const sal = document.getElementById('n-sal').value;
        const dept = document.getElementById('n-dept').value;
        db.users.push({name, user, pass, sal, dept, role:'emp'});
        sync(); alert("تمت إضافة الموظف"); loadView('hr');
    }

    function addDept() { const d = document.getElementById('new-dept').value; if(d) { db.depts.push(d); sync(); loadView('hr'); } }

    function backup() {
        const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'reem_erp_backup.json'; a.click();
    }

    function restore(e) {
        const reader = new FileReader();
        reader.onload = function(ev) { db = JSON.parse(ev.target.result); sync(); location.reload(); };
        reader.readAsText(e.target.files[0]);
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA'); }, 1000);
</script>
</body>
</html>
