<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REEM ERP | النظام الماسي المتكامل</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --gold: #d4af37; --blue-dark: #020c1b; --glass: rgba(16, 33, 65, 0.95); --danger: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: radial-gradient(circle at center, #112240, #020c1b); color: #fff; height: 100vh; overflow: hidden; }

        /* الساعة الذهبية */
        .reem-clock { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); padding: 10px 25px; border-radius: 50px; font-size: 22px; color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.3); text-shadow: 0 0 5px var(--gold); }

        /* لوحة الإعلانات المتحركة */
        .news-bar { background: var(--gold); color: #000; padding: 10px; font-weight: bold; overflow: hidden; white-space: nowrap; position: relative; }
        .news-text { display: inline-block; animation: scroll-news 20s linear infinite; }
        @keyframes scroll-news { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .sidebar { width: 280px; position: fixed; height: 100vh; right: 0; background: #000; border-left: 1px solid var(--gold); padding: 25px; z-index: 1000; }
        .main-content { margin-right: 280px; padding: 25px; height: 100vh; overflow-y: auto; }

        .nav-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: var(--gold); cursor: pointer; text-align: right; display: flex; align-items: center; gap: 15px; }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: #000; font-weight: bold; }
        .action-btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

        #sos-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        
        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main-content { margin-right: 0; } }
    </style>
</head>
<body>

<!-- تنبيه الطوارئ للمدير -->
<div id="sos-alert">
    <h1 style="font-size: 80px;">🚨 طوارئ 🚨</h1>
    <h2 id="sos-info">موظف يطلب النجدة!</h2>
    <button class="action-btn" style="width: 200px; margin-top: 30px;" onclick="stopSOS()">إيقاف الإنذار</button>
</div>

<!-- شريط الإعلانات -->
<div class="news-bar" id="news-section">
    <div class="news-text" id="news-content">مرحباً بكم في نظام شركة ريم المتكامل - يرجى الالتزام بمواعيد العمل الرسمية</div>
</div>

<div id="auth-screen" style="position: fixed; inset: 0; z-index: 9999; background: #020c1b; display: flex; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 380px; text-align: center; border: 2px solid var(--gold);">
        <h2 style="color: var(--gold); margin-bottom: 20px;">شركة ريم | REEM</h2>
        <input type="text" id="u_log" style="width:100%; padding:12px; margin-bottom:10px; background:rgba(255,255,255,0.05); border:1px solid var(--gold); color:white; border-radius:10px;" placeholder="المستخدم">
        <input type="password" id="p_log" style="width:100%; padding:12px; margin-bottom:20px; background:rgba(255,255,255,0.05); border:1px solid var(--gold); color:white; border-radius:10px;" placeholder="كلمة المرور">
        <button class="action-btn" onclick="doLogin()">دخول النظام</button>
    </div>
</div>

<aside class="sidebar">
    <div style="text-align: center; margin-bottom: 30px;"><h2 style="color: var(--gold);">REEM ERP</h2></div>
    <div id="menu"></div>
    <button class="nav-btn" style="margin-top: 50px; color: var(--danger); border-color: var(--danger);" onclick="location.reload()">خروج</button>
</aside>

<main class="main-content">
    <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
        <div id="clock" class="reem-clock">00:00:00</div>
        <h3 id="v-title" style="color: var(--gold);">لوحة التحكم</h3>
    </div>
    <div id="app"></div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('reem_final')) || {
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام"}],
        news: "مرحباً بكم في نظام شركة ريم المتكامل - يرجى الالتزام بمواعيد العمل الرسمية",
        sos: null
    };

    let session = null;
    const siren = new Audio('https://mixkit.co');

    function sync() { localStorage.setItem('reem_final', JSON.stringify(db)); }

    function doLogin() {
        const u = document.getElementById('u_log').value.trim();
        const p = document.getElementById('p_log').value.trim();
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) {
            session = found;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('news-content').innerText = db.news;
            renderNav();
            switchView('home');
        } else { alert("بيانات خاطئة!"); }
    }

    function renderNav() {
        const m = document.getElementById('menu');
        if(session.role === 'admin') {
            m.innerHTML = `
                <button class="nav-btn active" onclick="switchView('home')"><i class="fas fa-home"></i> الرئيسية</button>
                <button class="nav-btn" onclick="switchView('manage_news')"><i class="fas fa-bullhorn"></i> نشر إعلان</button>
                <button class="nav-btn" onclick="switchView('hr')"><i class="fas fa-users"></i> الموظفين</button>
            `;
        } else {
            m.innerHTML = `
                <button class="nav-btn active" onclick="switchView('home')"><i class="fas fa-user"></i> حسابي</button>
                <button class="nav-btn" style="background:var(--danger); color:white;" onclick="triggerSOS()"><i class="fas fa-exclamation-triangle"></i> طوارئ SOS</button>
            `;
        }
    }

    function switchView(v) {
        const app = document.getElementById('app');
        if(v === 'home') {
            app.innerHTML = `<div class="glass-card"><h2>أهلاً ${session.name}</h2><p>استخدم القائمة الجانبية لإدارة مهامك</p></div>`;
        } else if(v === 'manage_news') {
            app.innerHTML = `
                <div class="glass-card">
                    <h3>تعديل شريط الإعلانات</h3>
                    <input id="news-in" style="width:100%; padding:10px; margin:15px 0; background:transparent; border:1px solid var(--gold); color:white;" placeholder="اكتب الإعلان هنا...">
                    <button class="action-btn" onclick="saveNews()">نشر لكل الموظفين</button>
                </div>
            `;
        } else if(v === 'hr') {
            app.innerHTML = `
                <div class="glass-card">
                    <h3>إضافة موظف</h3>
                    <input id="n-n" placeholder="الاسم الكامل" style="display:block; width:100%; margin-bottom:10px;">
                    <input id="n-u" placeholder="اسم المستخدم" style="display:block; width:100%; margin-bottom:10px;">
                    <input id="n-p" placeholder="كلمة السر" style="display:block; width:100%; margin-bottom:15px;">
                    <button onclick="addU()" class="action-btn">حفظ الموظف</button>
                </div>
            `;
        }
    }

    function saveNews() {
        const txt = document.getElementById('news-in').value;
        db.news = txt; sync();
        document.getElementById('news-content').innerText = txt;
        alert("تم تحديث الإعلان لجميع المستخدمين");
    }

    function triggerSOS() {
        if(confirm("إرسال نداء طوارئ؟")) {
            db.sos = session.name; sync();
            alert("تم إبلاغ المدير فوراً");
        }
    }

    function checkSOS() {
        if(session && session.role === 'admin' && db.sos) {
            document.getElementById('sos-alert').style.display = 'flex';
            document.getElementById('sos-info').innerText = "🚨 طوارئ عاجلة من: " + db.sos;
            siren.play();
        }
    }

    function stopSOS() {
        db.sos = null; sync();
        siren.pause(); siren.currentTime = 0;
        document.getElementById('sos-alert').style.display = 'none';
    }

    function addU() {
        db.users.push({name: document.getElementById('n-n').value, user: document.getElementById('n-u').value, pass: document.getElementById('n-p').value, role: 'emp'});
        sync(); alert("تمت الإضافة بنجاح");
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA');
        if(session && session.role === 'admin') checkSOS();
    }, 1000);
</script>
</body>
</html>
