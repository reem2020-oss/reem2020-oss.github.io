<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - شركة ريم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background:#f5f5f5;
}

/* شاشة تسجيل الدخول */
.login-wrapper, .app-wrapper {
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.login-box {
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 3px 15px rgba(0,0,0,0.15);
    width:320px;
    text-align:center;
}
.login-box h2 { margin-bottom:20px; color:#0A8F3C; }
.login-box input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}
.login-box button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0A8F3C;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}
.error { color:#c00; font-size:14px; margin-top:8px; }

/* لوحة التحكم */
.app-wrapper { display:none; }
.sidebar {
    width:230px;
    background:#222;
    color:#fff;
    min-height:100vh;
    padding:20px;
}
.sidebar h2 { color:#D4AF37; font-size:20px; margin-bottom:20px; }
.sidebar a {
    display:block;
    color:#fff;
    text-decoration:none;
    margin:8px 0;
    padding:8px;
    border-radius:6px;
    font-size:15px;
}
.sidebar a.active, .sidebar a:hover { background:#333; }

.main {
    flex:1;
    padding:25px;
}
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
.topbar h1 { font-size:22px; color:#0A8F3C; margin:0; }

.stats {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:25px;
}
.stat-box {
    background:#fff;
    padding:15px 20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    min-width:180px;
}
.stat-box h3 { margin:0 0 5px; font-size:16px; color:#555; }
.stat-box p { margin:0; font-size:22px; color:#0A8F3C; }

.cards-row {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    flex:1;
    min-width:260px;
}

/* المقالات */
.posts-list table {
    width:100%;
    border-collapse:collapse;
}
.posts-list th, .posts-list td {
    border-bottom:1px solid #eee;
    padding:8px;
    text-align:right;
    font-size:14px;
}
.posts-list button {
    padding:4px 8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:13px;
}
.btn-edit { background:#0A8F3C; color:#fff; }
.btn-delete { background:#c0392b; color:#fff; }

/* إضافة مقال */
.form-post {
    display:flex;
    flex-direction:column;
    gap:10px;
}
.form-post input, .form-post textarea {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}
.form-post button {
    align-self:flex-start;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#D4AF37;
    color:#222;
    cursor:pointer;
    font-weight:600;
}

/* تبويبات */
.nav-tabs {
    margin-bottom:15px;
}
.nav-tabs button {
    padding:8px 14px;
    border:none;
    border-radius:20px;
    margin-left:8px;
    cursor:pointer;
    background:#eee;
    font-size:14px;
}
.nav-tabs button.active {
    background:#0A8F3C;
    color:#fff;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- شاشة تسجيل الدخول -->
<div class="login-wrapper" id="loginWrapper">
    <div class="login-box">
        <h2>تسجيل الدخول - لوحة ريم</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
        <div class="error" id="loginError"></div>
    </div>
</div>

<!-- لوحة التحكم -->
<div class="app-wrapper" id="appWrapper">
    <aside class="sidebar">
        <h2>لوحة التحكم</h2>
        <nav>
            <a href="#" class="active" onclick="showSection('dashboard');return false;">الرئيسية</a>
            <a href="#" onclick="showSection('posts');return false;">إدارة المقالات</a>
            <a href="#" onclick="showSection('newPost');return false;">إضافة مقال</a>
            <a href="#" onclick="logout();return false;">تسجيل الخروج</a>
        </nav>
    </aside>

    <main class="main">
        <div class="topbar">
            <h1>مرحبًا يا أبو ريم 👋</h1>
            <span>نظام إدارة محتوى بدون Backend</span>
        </div>

        <div class="nav-tabs">
            <button id="tab-dashboard" class="active" onclick="showSection('dashboard')">الإحصائيات</button>
            <button id="tab-posts" onclick="showSection('posts')">المقالات</button>
            <button id="tab-newPost" onclick="showSection('newPost')">مقال جديد</button>
        </div>

        <!-- الإحصائيات -->
        <section id="section-dashboard">
            <div class="stats">
                <div class="stat-box">
                    <h3>عدد المقالات</h3>
                    <p id="statPosts">0</p>
                </div>
                <div class="stat-box">
                    <h3>زيارات اليوم</h3>
                    <p>324</p>
                </div>
                <div class="stat-box">
                    <h3>إجمالي الزيارات</h3>
                    <p>12,450</p>
                </div>
            </div>

            <div class="cards-row">
                <div class="card">
                    <h3>نمو الزيارات</h3>
                    <canvas id="visitsChart" height="150"></canvas>
                </div>
                <div class="card">
                    <h3>توزيع الخدمات</h3>
                    <canvas id="servicesChart" height="150"></canvas>
                </div>
            </div>
        </section>

        <!-- المقالات -->
        <section id="section-posts" class="hidden">
            <h2>إدارة المقالات</h2>
            <div class="posts-list">
                <table>
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>التاريخ</th>
                            <th>تحكم</th>
                        </tr>
                    </thead>
                    <tbody id="postsTableBody"></tbody>
                </table>
            </div>
        </section>

        <!-- إضافة مقال -->
        <section id="section-newPost" class="hidden">
            <h2 id="postFormTitle">إضافة مقال جديد</h2>
            <form class="form-post" onsubmit="savePost(event)">
                <input type="hidden" id="editIndex">
                <input type="text" id="postTitle" placeholder="عنوان المقال" required>
                <textarea id="postContent" rows="6" placeholder="محتوى المقال" required></textarea>
                <button type="submit">حفظ</button>
            </form>
        </section>

    </main>
</div>

<script>
// كلمة المرور المشفرة (تمثيل بسيط)
const STORED_USER = "admin";
function fakeHash(str){ return btoa(str).split("").reverse().join(""); }

function handleLogin(){
    const u = username.value.trim();
    const p = password.value.trim();
    if(u==="admin" && fakeHash(p)===fakeHash("reem2026")){
        loginWrapper.style.display="none";
        appWrapper.style.display="flex";
        initDashboard();
    } else loginError.textContent="بيانات الدخول غير صحيحة";
}

function logout(){ location.reload(); }

// تبديل الأقسام
function showSection(name){
    ["dashboard","posts","newPost"].forEach(s=>{
        document.getElementById("section-"+s).classList.add("hidden");
        document.getElementById("tab-"+s).classList.remove("active");
    });
    document.getElementById("section-"+name).classList.remove("hidden");
    document.getElementById("tab-"+name).classList.add("active");
}

// CMS
function getPosts(){ return JSON.parse(localStorage.getItem("reem_posts")||"[]"); }
function setPosts(p){ localStorage.setItem("reem_posts",JSON.stringify(p)); renderPostsTable(); updateStats(); }

function savePost(e){
    e.preventDefault();
    const posts=getPosts();
    const title=postTitle.value.trim();
    const content=postContent.value.trim();
    const idx=editIndex.value;
    const date=new Date().toISOString().split("T")[0];

    if(idx!=="") posts[idx]={title,content,date:posts[idx].date};
    else posts.push({title,content,date});

    setPosts(posts);
    postTitle.value=""; postContent.value=""; editIndex.value="";
    postFormTitle.textContent="إضافة مقال جديد";
    showSection("posts");
}

function renderPostsTable(){
    const posts=getPosts();
    postsTableBody.innerHTML="";
    posts.forEach((p,i)=>{
        postsTableBody.innerHTML+=`
        <tr>
            <td>${p.title}</td>
            <td>${p.date}</td>
            <td>
                <button class="btn-edit" onclick="editPost(${i})">تعديل</button>
                <button class="btn-delete" onclick="deletePost(${i})">حذف</button>
            </td>
        </tr>`;
    });
}

function editPost(i){
    const p=getPosts()[i];
    postTitle.value=p.title;
    postContent.value=p.content;
    editIndex.value=i;
    postFormTitle.textContent="تعديل مقال";
    showSection("newPost");
}

function deletePost(i){
    if(!confirm("هل تريد حذف المقال؟")) return;
    const posts=getPosts();
    posts.splice(i,1);
    setPosts(posts);
}

function updateStats(){
    statPosts.textContent=getPosts().length;
}

// Charts
function initCharts(){
    new Chart(visitsChart.getContext("2d"),{
        type:"line",
        data:{
            labels:["يناير","فبراير","مارس","أبريل","مايو","يونيو"],
            datasets:[{
                data:[1200,1500,1800,2200,2600,3000],
                borderColor:"#0A8F3C",
                backgroundColor:"rgba(10,143,60,0.1)"
            }]
        }
    });

    new Chart(servicesChart.getContext("2d"),{
        type:"doughnut",
        data:{
            labels:["التعليمية","التسويق","المحاسبة"],
            datasets:[{
                data:[40,35,25],
                backgroundColor:["#D4AF37","#0A8F3C","#333"]
            }]
        }
    });
}

function initDashboard(){
    updateStats();
    renderPostsTable();
    initCharts();
}

</script>

</body>
</html>
