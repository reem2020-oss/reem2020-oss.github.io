<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">REEM TEAM | النظام المتكامل</title>
    
    <!-- المكاتب البرمجية -->
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        :root { --gold: #d4af37; --bg: #020c1b; --glass: rgba(16, 33, 65, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* --- واجهة الهبوط (Landing) --- */
        #landing-site { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 10%; background: radial-gradient(circle at center, #112240, #020c1b); }
        .nav-top { position: absolute; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; }
        .hero-h1 { font-size: 50px; margin-bottom: 20px; }
        .hero-h1 span { color: var(--gold); }
        .hero-p { color: #8892b0; font-size: 18px; max-width: 600px; line-height: 1.6; margin-bottom: 30px; }
        
        /* --- أزرار احترافية --- */
        .btn-gold { background: var(--gold); color: #000; padding: 12px 35px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212,175,55,0.4); }

        /* --- نافذة الدخول (Login Modal) --- */
        #login-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .login-card { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--gold); width: 400px; text-align: center; }

        /* --- لوحة التحكم العملاقة (Dashboard) --- */
        #app-ui { display: none; }
        .sidebar { width: 280px; background: #000; border-left: 1px solid var(--gold); height: 100vh; position: fixed; right: 0; padding: 30px 20px; display: flex; flex-direction: column; z-index: 1000; }
        .main { margin-right: 280px; padding: 40px; transition: 0.3s; width: calc(100% - 280px); }

        .brand-section { text-align: center; margin-bottom: 40px; }
        .brand-section img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 15px; }

        .nav-link { padding: 15px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #aaa; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-right: 5px solid var(--gold); }

        .glass-panel { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--gold); padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #map-canvas { height: 450px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 20px; }

        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-right: 0; width: 100%; } }
    </style>
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

<!-- 1. موقع الهبوط الرئيسي -->
<div id="landing-site">
    <div class="nav-top">
        <div style="font-size: 24px; font-weight: 800; color: var(--gold);">REEM TEAM™</div>
        <button class="btn-gold" onclick="showLogin()">دخول الموظفين</button>
    </div>
    <h1 class="hero-h1">إدارة <span>ذكية</span> للموظفين<br>بضغطة زر واحدة</h1>
    <p class="hero-p">ريم تيم هو النظام المتكامل لإدارة الحضور والإنصراف عبر GPS، متابعة الرواتب، وإصدار التقارير الميدانية لشركتك باحترافية كاملة.</p>
    <button class="btn-gold" style="padding: 18px 50px; font-size: 20px;" onclick="showLogin()">ابدأ الآن مجاناً</button>
</div>

<!-- 2. نافذة تسجيل الدخول -->
<div id="login-modal">
    <div class="login-card">
        <h2 style="color: var(--gold); margin-bottom: 25px;">تسجيل الدخول</h2>
        <input type="text" id="u_in" placeholder="اسم المستخدم">
        <input type="password" id="p_in" placeholder="كلمة المرور">
        <button class="btn-gold" style="width: 100%;" onclick="attemptLogin()">دخول آمن</button>
        <p style="margin-top: 20px; cursor: pointer; color: #666;" onclick="hideLogin()">إلغاء</p>
    </div>
</div>

<!-- 3. النظام العملاق (لوحة التحكم) -->
<div id="app-ui">
    <aside class="sidebar">
        <div class="brand-section">
            <img id="app-logo" src="https://flaticon.com">
            <h3 id="app-name" style="color: var(--gold);">ريم تيم</h3>
        </div>
        <div id="side-nav"></div>
        <button class="btn-gold" style="margin-top: auto; background: #c0392b; color: white;" onclick="location.reload()">خروج</button>
    </aside>

    <main class="main">
        <header class="glass-panel" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
            <div id="clock" style="font-size: 20px; color: var(--gold); font-weight: bold;"></div>
            <div id="user-info" style="font-weight: bold; border-right: 3px solid var(--gold); padding-right: 15px;"></div>
        </header>
        <div id="dynamic-content"></div>
    </main>
</div>

<script>
    // --- المحرك السحابي المحاكي ---
    const DB_KEY = 'REEM_TEAM_ULTIMATE_V1';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
        settings: { name: "ريم تيم", logo: "", currency: "EGP" },
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام", dept: "الإدارة", sal: 0}],
        logs: [], depts: ["الإدارة", "الميدان"]
    };

    function sync() { 
        localStorage.setItem(DB_KEY, JSON.stringify(db)); 
        applyBranding();
    }

    function applyBranding() {
        const logo = db.settings.logo || "https://flaticon.com";
        document.getElementById('app-logo').src = logo;
        document.getElementById('app-name').innerText = db.settings.name;
        document.getElementById('tab-title').innerText = db.settings.name;
    }

    // --- نظام الدخول ---
    function showLogin() { document.getElementById('login-modal').style.display = 'flex'; }
    function hideLogin() { document.getElementById('login-modal').style.display = 'none'; }

    let session = null;
    function attemptLogin() {
        const u = document.getElementById('u_in').value.trim();
        const p = document.getElementById('p_in').value.trim();
        const user = db.users.find(x => x.user === u && x.pass === p);
        if(user) {
            session = user;
            document.getElementById('landing-site').style.display = 'none';
            document.getElementById('login-modal').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            document.getElementById('user-info').innerText = session.name;
            renderMenu();
            loadPage(session.role === 'admin' ? 'dash' : 'punch');
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
            applyBranding();
        } else alert("بيانات الدخول خاطئة!");
    }

    function renderMenu() {
        const nav = document.getElementById('side-nav');
        const items = session.role === 'admin' ? 
            [{id:'dash', i:'fa-chart-pie', n:'الإحصائيات'}, {id:'hr', i:'fa-user-group', n:'الموظفين'}, {id:'track', i:'fa-map-location-dot', n:'التتبع'}, {id:'set', i:'fa-gear', n:'الإعدادات'}] :
            [{id:'punch', i:'fa-fingerprint', n:'البصمة'}, {id:'report', i:'fa-file-invoice', n:'تقريري'}];
        nav.innerHTML = items.map(l => `<div class="nav-link" onclick="loadPage('${l.id}')"><i class="fas ${l.i}"></i> ${l.n}</div>`).join('');
    }

    // --- واجهات النظام ---
    function loadPage(p) {
        const area = document.getElementById('dynamic-content');
        area.innerHTML = "";

        if(p === 'dash') {
            area.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                    <div class="glass-panel"><h4>الموظفين</h4><h2>${db.users.length}</h2></div>
                    <div class="glass-panel"><h4>النشاط اليومي</h4><h2>${db.logs.length}</h2></div>
                    <div class="glass-panel"><h4>العملة</h4><h2>${db.settings.currency}</h2></div>
                </div>`;
        } else if(p === 'hr') {
            area.innerHTML = `
                <div class="glass-panel">
                    <h3>إدارة شئون الموظفين</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input id="n_name" placeholder="الاسم"> <input id="n_user" placeholder="يوزر">
                        <input id="n_pass" placeholder="باسورد"> <input id="n_sal" placeholder="الراتب">
                        <button class="btn-gold" style="grid-column: span 2;" onclick="addStaff()">حفظ وإضافة</button>
                    </div>
                </div>
                <div class="glass-panel">
                    <table><thead><tr><th>الاسم</th><th>القسم</th><th>الإجراء</th></tr></thead>
                    <tbody>${db.users.map((u,i)=>`<tr><td>${u.name}</td><td>${u.dept}</td><td><i class="fas fa-trash" style="color:red; cursor:pointer" onclick="delStaff(${i})"></i></td></tr>`).join('')}</tbody></table>
                </div>`;
        } else if(p === 'set') {
            area.innerHTML = `
                <div class="glass-panel">
                    <h3>تخصيص النظام للعميل</h3>
                    <label>اسم الشركة</label><input id="s_name" value="${db.settings.name}">
                    <label>العملة</label><input id="s_cur" value="${db.settings.currency}">
                    <label>شعار الشركة (صورة)</label><input type="file" onchange="upLogo(event)">
                    <button class="btn-gold" style="width:100%; margin-top:20px;" onclick="saveSet()">حفظ الإعدادات</button>
                </div>`;
        } else if(p === 'punch') {
            area.innerHTML = `<div class="glass-panel" style="text-align:center;"><i class="fas fa-location-crosshairs" style="font-size:80px; color:var(--gold); margin-bottom:20px;"></i><h2>بصمة GPS الميدانية</h2><button class="btn-gold" onclick="punch()">تسجيل الحضور</button></div>`;
        } else if(p === 'track') {
            area.innerHTML = `<div class="glass-panel"><h3>رادار الميدان</h3><div id="map-canvas"></div></div>`;
            setTimeout(initMap, 200);
        }
    }

    // --- العمليات ---
    function upLogo(e) { const r = new FileReader(); r.onload=()=>{db.settings.logo=r.result;sync();}; r.readAsDataURL(e.target.files); }
    function saveSet() { db.settings.name=document.getElementById('s_name').value; db.settings.currency=document.getElementById('s_cur').value; sync(); alert("تم التحديث!"); }
    function addStaff() { db.users.push({name:document.getElementById('n_name').value, user:document.getElementById('n_user').value, pass:document.getElementById('n_pass').value, sal:document.getElementById('n_sal').value, role:'user', dept:'الميدان'}); sync(); loadPage('hr'); }
    function delStaff(i) { if(db.users[i].role!=='admin') { db.users.splice(i,1); sync(); loadPage('hr'); } }
    function punch() { navigator.geolocation.getCurrentPosition(pos => { db.logs.push({user:session.name, lat:pos.coords.latitude, lng:pos.coords.longitude, time:new Date().toLocaleString()}); sync(); alert("تم تسجيل حضورك!"); }); }
    function initMap() { const m=L.map('map-canvas').setView([24,46],5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m); db.logs.forEach(l=>L.marker([l.lat,l.lng]).addTo(m).bindPopup(l.user)); }

    applyBranding();
</script>
</body>
</html>
