<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">نظام ريم المتكامل Pro</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        :root { --gold: #d4af37; --dark: #020c1b; --glass: rgba(16, 33, 65, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: radial-gradient(circle at top right, #112240, #020c1b); color: #e6f1ff; min-height: 100vh; display: flex; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-left: 1px solid var(--gold); height: 100vh; position: fixed; right: 0; padding: 20px; display: flex; flex-direction: column; z-index: 1000; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .main-content { margin-right: 260px; padding: 25px; width: calc(100% - 260px); transition: 0.3s; }

        /* Logo Branding */
        .brand-box { text-align: center; margin-bottom: 25px; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 20px; }
        .brand-box img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; filter: drop-shadow(0 0 10px var(--gold)); }

        .glass-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(15px); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #b38f2d); color: #000; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.4); }
        
        .nav-link { padding: 14px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: #aaa; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-right: 4px solid var(--gold); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; color: white; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--gold); padding: 15px; text-align: right; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.2); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #map-canvas { height: 400px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 15px; }

        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; } .main-content { margin-right: 0; width: 100%; } }
    </style>
</head>
<body>

<!-- Login / Import Screen -->
<div id="auth-screen">
    <div class="glass-card" style="width: 400px; text-align: center; border: 2px solid var(--gold);">
        <img id="login-logo" src="" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; display: none;">
        <h2 id="login-comp-name" style="color: var(--gold); margin-bottom: 25px;">نظام إدارة الشركات</h2>
        <input type="text" id="u_in" placeholder="اسم المستخدم">
        <input type="password" id="p_in" placeholder="كلمة المرور">
        <button class="btn-gold" style="width: 100%;" onclick="login()">دخول آمن للنظام</button>
        
        <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 15px;">
            <p style="font-size: 12px; color: #888; margin-bottom: 10px;">لمزامنة بيانات الموظفين الجديدة:</p>
            <input type="file" id="import-file" style="display: none;" onchange="importData(event)">
            <button class="btn-gold" style="background: #2c3e50; color: white; font-size: 12px;" onclick="document.getElementById('import-file').click()">
                <i class="fas fa-file-import"></i> استيراد قاعدة البيانات
            </button>
        </div>
    </div>
</div>

<aside class="sidebar">
    <div class="brand-box">
        <img id="side-logo" src="">
        <h3 id="side-comp-name" style="color: var(--gold); margin-top: 15px; font-size: 18px;">اسم الشركة</h3>
    </div>
    <div id="nav-links"></div>
    <button class="btn-gold" style="margin-top: auto; background: #c0392b; color: white;" onclick="location.reload()">
        <i class="fas fa-power-off"></i> خروج
    </button>
</aside>

<main class="main-content">
    <header class="glass-card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
        <div id="clock" style="font-size: 20px; color: var(--gold); font-weight: bold;">00:00:00</div>
        <div id="user-display" style="font-weight: bold; border-right: 3px solid var(--gold); padding-right: 15px;"></div>
    </header>
    <div id="view-area"></div>
</main>

<script>
    // --- المحرك الرئيسي وقاعدة البيانات ---
    const STORAGE_KEY = 'REEM_ERP_ULTIMATE_PRO';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        settings: { name: "شركة ريم العالمية", currency: "EGP", logo: "" },
        depts: ["الإدارة", "الميدان", "المبيعات"],
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام", dept: "الإدارة", sal: 0}],
        logs: []
    };

    function sync() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        updateBranding();
    }

    function updateBranding() {
        const logo = db.settings.logo || "https://flaticon.com";
        document.getElementById('side-comp-name').innerText = db.settings.name;
        document.getElementById('login-comp-name').innerText = db.settings.name;
        document.getElementById('side-logo').src = logo;
        document.getElementById('login-logo').src = logo;
        document.getElementById('login-logo').style.display = "inline-block";
        document.getElementById('tab-title').innerText = db.settings.name;
    }

    // --- نظام الدخول والملاحة ---
    let session = null;
    function login() {
        const u = document.getElementById('u_in').value.trim();
        const p = document.getElementById('p_in').value.trim();
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) {
            session = found;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-display').innerHTML = `<i class="fas fa-user-tie"></i> ${session.name}`;
            renderNav(); loadView(session.role === 'admin' ? 'dash' : 'punch');
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
        } else alert("بيانات الدخول غير صحيحة!");
    }

    function renderNav() {
        const nav = document.getElementById('nav-links');
        const links = session.role === 'admin' ? 
            [{id:'dash', i:'fa-chart-pie', n:'الإحصائيات'}, {id:'hr', i:'fa-user-gear', n:'إدارة الموظفين'}, {id:'track', i:'fa-map-marked-alt', n:'رادار الميدان'}, {id:'set', i:'fa-sliders', n:'إعدادات الشركة'}] :
            [{id:'punch', i:'fa-fingerprint', n:'بصمة GPS'}, {id:'report', i:'fa-paper-plane', n:'إرسال التقرير'}];
        nav.innerHTML = links.map(l => `<div class="nav-link" onclick="loadView('${l.id}')"><i class="fas ${l.i}"></i> ${l.n}</div>`).join('');
    }

    // --- عرض الواجهات ---
    function loadView(v) {
        const area = document.getElementById('view-area');
        area.innerHTML = "";

        if(v === 'dash') {
            area.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px;">
                    <div class="glass-card"><h4>الموظفين</h4><h2>${db.users.length}</h2></div>
                    <div class="glass-card"><h4>الأقسام</h4><h2>${db.depts.length}</h2></div>
                    <div class="glass-card"><h4>حضور اليوم</h4><h2>${db.logs.filter(l=>l.date===new Date().toLocaleDateString()).length}</h2></div>
                </div>`;
        } else if(v === 'hr') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>إدارة الأقسام</h3>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <input id="new-dept" placeholder="إضافة قسم جديد">
                        <button class="btn-gold" onclick="addDept()">إضافة</button>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">${db.depts.map((d,i)=>`<span style="background:rgba(212,175,55,0.2); padding:5px 12px; border-radius:8px; font-size:12px;">${d} <i class="fas fa-times" style="cursor:pointer; margin-right:5px;" onclick="delDept(${i})"></i></span>`).join('')}</div>
                </div>
                <div class="glass-card">
                    <h3>إضافة / تعديل موظف</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <input id="n_name" placeholder="الاسم"> <input id="n_user" placeholder="يوزر الدخول">
                        <input id="n_pass" placeholder="كلمة المرور"> <input id="n_sal" placeholder="الراتب">
                        <select id="n_dept">${db.depts.map(d=>`<option>${d}</option>`).join('')}</select>
                        <button class="btn-gold" onclick="addEmp()">حفظ الموظف</button>
                    </div>
                </div>
                <div class="glass-card">
                    <table>
                        <thead><tr><th>الموظف</th><th>القسم</th><th>الراتب</th><th>إجراء</th></tr></thead>
                        <tbody>${db.users.map((u,i)=>`<tr><td>${u.name}</td><td>${u.dept}</td><td>${u.sal} ${db.settings.currency}</td><td>${u.role!=='admin' ? `<i class="fas fa-trash" style="color:#e74c3c; cursor:pointer" onclick="delEmp(${i})"></i>`:''}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
        } else if(v === 'set') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>إعدادات الشركة والبيع</h3>
                    <label>اسم الشركة</label><input id="s_name" value="${db.settings.name}">
                    <label>العملة</label><input id="s_cur" value="${db.settings.currency}">
                    <label>لوجو الشركة (ارفع صورة من جهازك)</label><input type="file" id="logo-up" onchange="handleLogo(event)">
                    <button class="btn-gold" style="width:100%; margin-top:15px;" onclick="saveSettings()">تحديث البيانات</button>
                    <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
                    <button class="btn-gold" style="width:100%; background:#27ae60; color:white;" onclick="exportDB()">تحميل قاعدة البيانات (للبيع)</button>
                </div>`;
        } else if(v === 'punch') {
            area.innerHTML = `<div class="glass-card" style="text-align:center;"><i class="fas fa-location-arrow" style="font-size:70px; color:var(--gold); margin-bottom:20px;"></i><h2>بصمة الحضور الجغرافية</h2><button class="btn-gold" style="width:200px; margin:20px auto;" onclick="doPunch()">تسجيل الحضور</button></div>`;
        } else if(v === 'track') {
            area.innerHTML = `<div class="glass-card"><h3>رادار المواقع الحية</h3><div id="map-canvas"></div></div>`;
            setTimeout(initMap, 200);
        }
    }

    // --- وظائف التحكم والمزامنة ---
    function handleLogo(e) {
        const reader = new FileReader();
        reader.onload = () => { db.settings.logo = reader.result; sync(); };
        reader.readAsDataURL(e.target.files[0]);
    }

    function addDept() { const d = document.getElementById('new-dept').value; if(d) { db.depts.push(d); sync(); loadView('hr'); } }
    function delDept(i) { db.depts.splice(i,1); sync(); loadView('hr'); }

    function addEmp() {
        const u = { name: document.getElementById('n_name').value, user: document.getElementById('n_user').value, pass: document.getElementById('n_pass').value, sal: document.getElementById('n_sal').value, dept: document.getElementById('n_dept').value, role: 'user' };
        if(!u.user || !u.pass) return alert("يرجى إكمال البيانات");
        db.users.push(u); sync(); loadView('hr');
    }

    function delEmp(i) { db.users.splice(i,1); sync(); loadView('hr'); }

    function saveSettings() {
        db.settings.name = document.getElementById('s_name').value;
        db.settings.currency = document.getElementById('s_cur').value;
        sync(); alert("تم التحديث بنجاح!");
    }

    // تصدير البيانات (لكي ترسلها للموظف)
    function exportDB() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `REEM_DATA_${db.settings.name}.json`;
        a.click();
    }

    // استيراد البيانات (يقوم به الموظف على جهازه)
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            sync();
            alert("تم استيراد بيانات الشركة بنجاح! يمكنك الدخول الآن.");
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function doPunch() {
        navigator.geolocation.getCurrentPosition(p => {
            db.logs.push({ user: session.name, lat: p.coords.latitude, lng: p.coords.longitude, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() });
            sync(); alert("تم تسجيل موقعك وحضورك!");
        }, () => alert("فشل تحديد الموقع، يرجى تفعيل GPS"));
    }

    function initMap() {
        const map = L.map('map-canvas').setView([24.7136, 46.6753], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        db.logs.forEach(l => {
            L.marker([l.lat, l.lng]).addTo(map).bindPopup(`<b>${l.user}</b><br>${l.time}`);
        });
    }

    // تشغيل الهوية عند البداية
    updateBranding();
</script>
</body>
</html>
