<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>REEM TIME PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0b1220;color:#fff;margin:0}
.sidebar{width:250px;height:100vh;background:#111;position:fixed;right:0;padding:20px}
.main{margin-right:260px;padding:20px}
.card{background:#1f2937;padding:20px;border-radius:10px;margin-bottom:20px}
button{padding:10px;background:#7d33ff;color:#fff;border:none;border-radius:8px;cursor:pointer}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
</style>
</head>

<body>

<div id="login">
<div class="card" style="width:300px;margin:100px auto">
<h3>دخول</h3>
<input id="u">
<input id="p" type="password">
<button onclick="login()">دخول</button>
</div>
</div>

<div id="app" style="display:none">
<div class="sidebar">
<div id="logo"></div>
<div onclick="page('dash')">🏠 الرئيسية</div>
<div onclick="page('emp')">👥 الموظفين</div>
<div onclick="page('att')">⏱ الحضور</div>
<div onclick="page('pay')">💰 الرواتب</div>
<div onclick="page('punch')">📍 البصمة</div>
</div>

<div class="main" id="c"></div>
</div>

<script>
const firebaseConfig={apiKey:"YOUR_CONFIG"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let user,company;

async function login(){
let r=await db.collection("users")
.where("username","==",u.value)
.where("password","==",p.value).get();

if(r.empty)return alert("خطأ");

user=r.docs[0].data();
let comp=await db.collection("companies").doc(user.companyId).get();
company=comp.data();

login.style.display="none";
app.style.display="block";
logo.innerHTML=`<img src="${company.logo}" width="120">`;

page('dash');
}

function page(p){
if(p=="dash"){
c.innerHTML=`<div class="card">مرحبا ${user.name}</div>`;
}

if(p=="emp"){
c.innerHTML=`
<div class="card">
<h3>إضافة موظف</h3>
<input id="n" placeholder="اسم">
<input id="un" placeholder="يوزر">
<input id="pw" placeholder="باس">
<input id="sal" placeholder="راتب شهري">
<button onclick="addEmp()">إضافة</button>
</div>`;
}

if(p=="att"){loadLogs();}

if(p=="pay"){loadPayroll();}

if(p=="punch"){
c.innerHTML=`
<div class="card">
<button onclick="punch('in')">حضور</button>
<button onclick="punch('out')">انصراف</button>
</div>`;
}
}

async function addEmp(){
await db.collection("users").add({
name:n.value,
username:un.value,
password:pw.value,
salary:parseFloat(sal.value||0),
companyId:user.companyId
});
alert("تم");
}

function punch(type){
navigator.geolocation.getCurrentPosition(async(pos)=>{

let today=new Date().toISOString().slice(0,10);

let logs=await db.collection("logs")
.where("userId","==",user.id)
.where("date","==",today).get();

if(type=="in"){
if(!logs.empty)return alert("مسجل");

await db.collection("logs").add({
userId:user.id,
name:user.name,
companyId:user.companyId,
date:today,
checkIn:new Date()
});
alert("تم الحضور");
}

if(type=="out"){
if(logs.empty)return alert("لا يوجد حضور");

let doc=logs.docs[0];
let data=doc.data();

let hours=(new Date()-data.checkIn.toDate())/3600000;

await db.collection("logs").doc(doc.id).update({
checkOut:new Date(),
totalHours:hours
});
alert("تم الانصراف");
}
});
}

async function loadLogs(){
let logs=await db.collection("logs")
.where("companyId","==",user.companyId).get();

let html="<div class='card'><h3>السجلات</h3>";
logs.forEach(d=>{
let l=d.data();
html+=`<p>${l.name} | ${l.date} | ${l.totalHours||0}</p>`;
});
html+="</div>";
c.innerHTML=html;
}

async function loadPayroll(){
let logs=await db.collection("logs")
.where("companyId","==",user.companyId).get();

let users=await db.collection("users")
.where("companyId","==",user.companyId).get();

let res={};

users.forEach(u=>{
let d=u.data();
res[d.name]={salary:d.salary||0,hours:0,bonus:0,deduct:0};
});

logs.forEach(l=>{
let d=l.data();
if(d.totalHours)res[d.name].hours+=d.totalHours;
});

let html="<div class='card'><h2>الرواتب</h2>";

for(let n in res){
let r=res[n];
let final=r.salary + r.bonus - r.deduct;

html+=`
<div style="background:#111;padding:10px;margin:10px;border-radius:10px">
👤 ${n}<br>
💼 راتب: ${r.salary}<br>
⏱ ساعات: ${r.hours.toFixed(2)}<br>
➕ إضافي: ${r.bonus}<br>
➖ خصم: ${r.deduct}<br>
💰 صافي: ${final}
</div>`;
}

html+=`<button onclick="exportCSV()">📥 تحميل</button></div>`;
c.innerHTML=html;
}

function exportCSV(){
let csv="name,salary\n";
let a=document.createElement("a");
a.href='data:text/csv;charset=utf-8,'+csv;
a.download="payroll.csv";
a.click();
}
</script>

</body>
</html>
