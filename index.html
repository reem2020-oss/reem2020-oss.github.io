<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REEM Pro | نظام الطوارئ والاتصال الذكي</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --gold: #d4af37; --blue: #020c1b; --danger: #ff0000; --glass: rgba(16, 33, 65, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at center, #112240, #020c1b); color: #fff; height: 100vh; overflow: hidden; }

        /* الأنيميشن الخاص بزر الطوارئ */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
        .sos-btn { background: var(--danger); color: white; border: none; padding: 20px; border-radius: 50%; font-size: 24px; font-weight: bold; cursor: pointer; animation: pulse-red 1.5s infinite; width: 100px; height: 100px; }
        
        /* تأثير وضع الاستنفار للمدير */
        @keyframes alert-bg { 0% { background: #020c1b; } 50% { background: #4d0000; } 100% { background: #020c1b; } }
        .emergency-active { animation: alert-bg 0.5s infinite; }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .sidebar { width: 260px; position: fixed; height: 100vh; right: 0; background: #000; border-left: 1px solid var(--gold); padding: 20px; z-index: 1000; }
        .main-content { margin-right: 260px; padding: 20px; height: 100vh; overflow-y: auto; transition: 0.3s; }
        
        .nav-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: transparent; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 10px; color: var(--gold); cursor: pointer; text-align: right; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--gold); color: #000; }
        .action-btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        #chat-box { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 8px; font-size: 13px; }
        .msg-admin { background: var(--gold); color: #000; }
        .msg-emp { background: #1e293b; color: #fff; border: 1px solid var(--gold); }
    </style>
</head>
<body id="main-body">

<div id="auth-screen" style="position: fixed; inset: 0; z-index: 9999; background: #020c1b; display: flex; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 350px; text-align: center; border: 2px solid var(--gold);">
        <h2 style="color: var(--gold); margin-bottom: 20px;">REEM Pro | 2026</h2>
        <input type="text" id="u_log" style="width:100%; padding:10px; margin-bottom:10px; background:transparent; border:1px solid var(--gold); color:white;" placeholder="المستخدم">
        <input type="password" id="p_log" style="width:100%; padding:10px; margin-bottom:15px; background:transparent; border:1px solid var(--gold); color:white;" placeholder="كلمة المرور">
        <button class="action-btn" onclick="doLogin()">دخول النظام</button>
    </div>
</div>

<aside class="sidebar">
    <div style="text-align: center; margin-bottom: 20px;"><h2 style="color: var(--gold);">شركة ريم</h2></div>
    <div id="menu"></div>
    <button class="nav-btn" style="margin-top: 30px; color: #ff4d4d; border-color: #ff4d4d;" onclick="location.reload()">تسجيل خروج</button>
</aside>

<main class="main-content">
    <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
        <div id="reem-clock" style="font-size:20px; color:var(--gold); font-family:monospace;">00:00:00</div>
        <h3 id="v-title" style="color: var(--gold);">لوحة الإدارة</h3>
    </div>
    <div id="app"></div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('reem_v8')) || {
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام"}],
        chats: [],
        alerts: []
    };

    let session = null;
    const siren = new Audio('https://mixkit.co'); // صوت إنذار
    const msgSound = new Audio('https://mixkit.co');

    function sync() { localStorage.setItem('reem_v8', JSON.stringify(db)); }

    function doLogin() {
        const u = document.getElementById('u_log').value.trim();
        const p = document.getElementById('p_log').value.trim();
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) {
            session = found;
            document.getElementById('auth-screen').style.display = 'none';
            renderNav();
            switchView('home');
        } else { alert("بيانات خاطئة!"); }
    }

    function renderNav() {
        const m = document.getElementById('menu');
        if(session.role === 'admin') {
            m.innerHTML = `
                <button class="nav-btn" onclick="switchView('home')">الرئيسية</button>
                <button class="nav-btn" onclick="switchView('chat')">الدردشة والاتصال</button>
                <button class="nav-btn" onclick="switchView('hr')">الموظفين</button>
            `;
        } else {
            m.innerHTML = `
                <button class="nav-btn" onclick="switchView('home')">واجهتي</button>
                <button class="nav-btn" onclick="switchView('chat')">مراسلة المدير</button>
            `;
        }
    }

    function switchView(v) {
        const app = document.getElementById('app');
        if(v === 'home') {
            if(session.role === 'admin') {
                app.innerHTML = `
                    <div class="glass-card" id="alert-panel">
                        <h3>حالة النظام: <span id="sys-status" style="color:var(--gold)">مستقر ✅</span></h3>
                        <div id="active-alerts"></div>
                    </div>
                `;
                checkAlerts();
            } else {
                app.innerHTML = `
                    <div class="glass-card" style="text-align:center; padding:40px;">
                        <button class="sos-btn" onclick="sendSOS()">SOS</button>
                        <h2 style="margin-top:20px; color:var(--danger)">زر الطوارئ</h2>
                        <p>اضغط فقط في الحالات العاجلة جداً</p>
                    </div>
                `;
            }
        } else if(v === 'chat') {
            app.innerHTML = `
                <div class="glass-card">
                    <div id="chat-box"></div>
                    <div style="display:flex; gap:10px;">
                        <input id="m-in" style="flex:1; padding:10px; border-radius:10px; border:1px solid var(--gold); background:transparent; color:white;" placeholder="اكتب هنا...">
                        <button onclick="sendMsg()" class="action-btn" style="width:60px;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            `;
            renderChat();
        } else if(v === 'hr') {
            app.innerHTML = `<div class="glass-card"><h3>إضافة موظف</h3><input id="n-n" placeholder="الاسم"><input id="n-u" placeholder="المستخدم"><input id="n-p" placeholder="كلمة السر"><button onclick="addU()" class="action-btn">حفظ</button></div>`;
        }
    }

    function sendSOS() {
        if(!confirm("هل أنت متأكد من إرسال نداء استغاثة للمدير؟")) return;
        navigator.geolocation.getCurrentPosition(pos => {
            db.alerts.push({ name: session.name, time: new Date().toLocaleTimeString(), lat: pos.coords.latitude, lng: pos.coords.longitude });
            sync();
            alert("تم إرسال نداء الطوارئ. ابقَ في مكانك.");
        });
    }

    function checkAlerts() {
        const panel = document.getElementById('active-alerts');
        if(!panel) return;
        if(db.alerts.length > 0) {
            document.getElementById('sys-status').innerHTML = "استنفار 🚨";
            document.getElementById('main-body').classList.add('emergency-active');
            siren.play();
            panel.innerHTML = db.alerts.map(a => `<div class="glass-card" style="border-color:red"><strong>طوارئ: ${a.name}</strong><br>الوقت: ${a.time}<br><button onclick="clearAlerts()" class="action-btn" style="background:red">إيقاف الإنذار</button></div>`).join('');
        }
    }

    function clearAlerts() {
        db.alerts = [];
        sync();
        siren.pause();
        siren.currentTime = 0;
        document.getElementById('main-body').classList.remove('emergency-active');
        switchView('home');
    }

    function sendMsg() {
        const t = document.getElementById('m-in').value; if(!t) return;
        db.chats.push({ n: session.name, t, r: session.role });
        sync(); document.getElementById('m-in').value = ''; renderChat();
    }

    function renderChat() {
        const b = document.getElementById('chat-box'); if(!b) return;
        b.innerHTML = db.chats.map(c => `<div class="msg ${c.r==='admin'?'msg-admin':'msg-emp'}"><strong>${c.n}:</strong> ${c.t}</div>`).join('');
        b.scrollTop = b.scrollHeight;
    }

    function addU() {
        db.users.push({name: document.getElementById('n-n').value, user: document.getElementById('n-u').value, pass: document.getElementById('n_p').value, role: 'emp'});
        sync(); alert("تم الإضافة");
    }

    setInterval(() => { document.getElementById('reem-clock').innerText = new Date().toLocaleTimeString('ar-SA'); checkAlerts(); }, 1000);
</script>
</body>
</html>
