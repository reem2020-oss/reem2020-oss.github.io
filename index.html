<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reem Team - نظام الحضور والانصراف الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ecf0f1;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }

        .header-title .icon {
            font-size: 32px;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-role {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-left: 5px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .nav-top {
            background: rgba(20, 20, 40, 0.8);
            padding: 15px 30px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(102,126,234,0.2);
        }

        .nav-btn {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            color: #ecf0f1;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: rgba(102,126,234,0.3);
            border-color: rgba(102,126,234,0.6);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Map Container */
        #map {
            width: 100%;
            height: 500px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Reports */
        .report-container {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .report-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .report-data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .report-item {
            background: rgba(102,126,234,0.05);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .report-item-label {
            color: #bdc3c7;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .report-item-value {
            color: #667eea;
            font-size: 24px;
            font-weight: 700;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .chart-container {
            background: rgba(102,126,234,0.1);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid rgba(102,126,234,0.2);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .success-message {
            background: rgba(39,174,96,0.1);
            border: 1px solid rgba(39,174,96,0.3);
            color: #27ae60;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <div class="icon">⏰</div>
                <h1>Reem Team</h1>
            </div>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div>
                        <div id="userName" style="color: white; font-weight: 500;">مدير</div>
                        <div class="user-role" id="userRole">مسؤول النظام</div>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-top">
            <button class="nav-btn active" onclick="showSection('monitoring', this)">🗺️ المراقبة</button>
            <button class="nav-btn" onclick="showSection('reports', this)">📈 التقارير</button>
            <button class="nav-btn" onclick="showSection('attendance', this)">📋 الحضور</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Monitoring Section -->
            <div id="monitoring" class="section active">
                <h2 style="margin-bottom: 20px; color: #667eea;">المراقبة الحية</h2>
                <div id="map"></div>
                <div class="report-container">
                    <div class="report-title">📊 إحصائيات الموظفين الحاليين</div>
                    <div class="report-data">
                        <div class="report-item">
                            <div class="report-item-label">الموظفون الحاضرون</div>
                            <div class="report-item-value" id="presentCount">0</div>
                        </div>
                        <div class="report-item">
                            <div class="report-item-label">الموظفون الغائبون</div>
                            <div class="report-item-value" id="absentCount">0</div>
                        </div>
                        <div class="report-item">
                            <div class="report-item-label">المتأخرون</div>
                            <div class="report-item-value" id="lateCount">0</div>
                        </div>
                        <div class="report-item">
                            <div class="report-item-label">إجمالي الموظفين</div>
                            <div class="report-item-value" id="totalCount">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reports Section -->
            <div id="reports" class="section">
                <h2 style="margin-bottom: 20px; color: #667eea;">التقارير</h2>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <button class="btn btn-primary" style="padding: 20px; text-align: center; height: auto;" onclick="generateAttendanceReport()">📊 تقرير الحضور</button>
                    <button class="btn btn-primary" style="padding: 20px; text-align: center; height: auto;" onclick="generateDepartmentReport()">🏢 تقرير الأقسام</button>
                    <button class="btn btn-primary" style="padding: 20px; text-align: center; height: auto;" onclick="generateEmployeeReport()">👥 تقرير الموظفين</button>
                    <button class="btn btn-success" style="padding: 20px; text-align: center; height: auto;" onclick="exportCurrentReport()">📥 تصدير PDF</button>
                </div>

                <div id="reportContent">
                    <div class="loading">
                        <p>اختر نوع التقرير لعرضه</p>
                    </div>
                </div>
            </div>

            <!-- Attendance Section -->
            <div id="attendance" class="section">
                <h2 style="margin-bottom: 20px; color: #667eea;">سجل الحضور</h2>
                <div id="attendanceContent" class="loading">
                    <div class="spinner"></div>
                    <p>جاري تحميل البيانات...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let currentReport = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeMap();
            loadAttendanceStats();
            loadAttendanceRecords();
        });

        // Initialize Map
        function initializeMap() {
            map = L.map('map').setView([24.7136, 46.6753], 12); // Riyadh coordinates
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Add sample departments
            const departments = [
                { name: 'القسم الإداري', lat: 24.7136, lng: 46.6753, employees: 12 },
                { name: 'قسم التطوير', lat: 24.7200, lng: 46.6800, employees: 8 },
                { name: 'قسم المبيعات', lat: 24.7100, lng: 46.6700, employees: 15 },
                { name: 'قسم الموارد البشرية', lat: 24.7150, lng: 46.6750, employees: 5 }
            ];

            departments.forEach(dept => {
                const marker = L.circleMarker([dept.lat, dept.lng], {
                    radius: 8 + (dept.employees / 2),
                    fillColor: '#667eea',
                    color: '#764ba2',
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).addTo(map);

                marker.bindPopup(`
                    <div style="text-align: center;">
                        <strong>${dept.name}</strong><br>
                        الموظفون: ${dept.employees}<br>
                        <small>الموقع: ${dept.lat.toFixed(4)}, ${dept.lng.toFixed(4)}</small>
                    </div>
                `);
            });
        }

        // Load Attendance Stats
        async function loadAttendanceStats() {
            try {
                // Mock data - replace with API call
                document.getElementById('presentCount').textContent = '45';
                document.getElementById('absentCount').textContent = '8';
                document.getElementById('lateCount').textContent = '5';
                document.getElementById('totalCount').textContent = '58';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load Attendance Records
        async function loadAttendanceRecords() {
            try {
                const html = `
                    <div class="report-container">
                        <div class="report-title">📋 آخر سجلات الحضور</div>
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 2px solid rgba(102,126,234,0.3);">
                                    <th style="padding: 10px; text-align: right; color: #667eea;">الموظف</th>
                                    <th style="padding: 10px; text-align: right; color: #667eea;">الوقت</th>
                                    <th style="padding: 10px; text-align: right; color: #667eea;">الحالة</th>
                                    <th style="padding: 10px; text-align: right; color: #667eea;">الموقع</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr style="border-bottom: 1px solid rgba(102,126,234,0.1);">
                                    <td style="padding: 10px;">أحمد محمد</td>
                                    <td style="padding: 10px;">08:15 AM</td>
                                    <td style="padding: 10px;"><span style="background: #27ae60; color: white; padding: 3px 8px; border-radius: 4px;">حاضر</span></td>
                                    <td style="padding: 10px;">الرياض</td>
                                </tr>
                                <tr style="border-bottom: 1px solid rgba(102,126,234,0.1);">
                                    <td style="padding: 10px;">فاطمة علي</td>
                                    <td style="padding: 10px;">08:45 AM</td>
                                    <td style="padding: 10px;"><span style="background: #f39c12; color: white; padding: 3px 8px; border-radius: 4px;">متأخر</span></td>
                                    <td style="padding: 10px;">الرياض</td>
                                </tr>
                                <tr style="border-bottom: 1px solid rgba(102,126,234,0.1);">
                                    <td style="padding: 10px;">محمود حسن</td>
                                    <td style="padding: 10px;">08:30 AM</td>
                                    <td style="padding: 10px;"><span style="background: #27ae60; color: white; padding: 3px 8px; border-radius: 4px;">حاضر</span></td>
                                    <td style="padding: 10px;">الرياض</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
                document.getElementById('attendanceContent').innerHTML = html;
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }

        // Generate Reports
        function generateAttendanceReport() {
            currentReport = {
                title: 'تقرير الحضور اليومي',
                type: 'attendance',
                data: [
                    { date: 'اليوم', present: 45, absent: 8, late: 5 },
                    { date: 'أمس', present: 48, absent: 5, late: 7 },
                    { date: 'قبل يومين', present: 50, absent: 3, late: 5 }
                ]
            };
            displayReport();
        }

        function generateDepartmentReport() {
            currentReport = {
                title: 'تقرير الأقسام',
                type: 'department',
                data: [
                    { name: 'القسم الإداري', employees: 12, present: 11, absent: 1 },
                    { name: 'قسم التطوير', employees: 8, present: 8, absent: 0 },
                    { name: 'قسم المبيعات', employees: 15, present: 13, absent: 2 },
                    { name: 'قسم الموارد البشرية', employees: 5, present: 5, absent: 0 }
                ]
            };
            displayReport();
        }

        function generateEmployeeReport() {
            currentReport = {
                title: 'تقرير الموظفين',
                type: 'employee',
                data: [
                    { name: 'أحمد محمد', department: 'التطوير', status: 'حاضر', time: '08:15' },
                    { name: 'فاطمة علي', department: 'المبيعات', status: 'متأخر', time: '08:45' },
                    { name: 'محمود حسن', department: 'الإدارة', status: 'حاضر', time: '08:30' },
                    { name: 'سارة أحمد', department: 'الموارد البشرية', status: 'حاضر', time: '08:20' }
                ]
            };
            displayReport();
        }

        function displayReport() {
            let html = `<div class="report-container">
                <div class="report-title">${currentReport.title}</div>
                <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(102,126,234,0.3);">`;
            
            // Generate headers
            if (currentReport.type === 'attendance') {
                html += `<th style="padding: 10px; text-align: right; color: #667eea;">التاريخ</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الحاضرون</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الغائبون</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">المتأخرون</th>`;
            } else if (currentReport.type === 'department') {
                html += `<th style="padding: 10px; text-align: right; color: #667eea;">القسم</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">إجمالي الموظفين</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الحاضرون</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الغائبون</th>`;
            } else {
                html += `<th style="padding: 10px; text-align: right; color: #667eea;">الموظف</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">القسم</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الحالة</th>
                        <th style="padding: 10px; text-align: right; color: #667eea;">الوقت</th>`;
            }
            
            html += `</tr></thead><tbody>`;
            
            // Generate rows
            currentReport.data.forEach(item => {
                html += '<tr style="border-bottom: 1px solid rgba(102,126,234,0.1);">';
                if (currentReport.type === 'attendance') {
                    html += `<td style="padding: 10px;">${item.date}</td>
                            <td style="padding: 10px;"><span style="color: #27ae60; font-weight: 600;">${item.present}</span></td>
                            <td style="padding: 10px;"><span style="color: #e74c3c; font-weight: 600;">${item.absent}</span></td>
                            <td style="padding: 10px;"><span style="color: #f39c12; font-weight: 600;">${item.late}</span></td>`;
                } else if (currentReport.type === 'department') {
                    html += `<td style="padding: 10px;">${item.name}</td>
                            <td style="padding: 10px;">${item.employees}</td>
                            <td style="padding: 10px;"><span style="color: #27ae60; font-weight: 600;">${item.present}</span></td>
                            <td style="padding: 10px;"><span style="color: #e74c3c; font-weight: 600;">${item.absent}</span></td>`;
                } else {
                    html += `<td style="padding: 10px;">${item.name}</td>
                            <td style="padding: 10px;">${item.department}</td>
                            <td style="padding: 10px;"><span style="background: ${item.status === 'حاضر' ? '#27ae60' : '#f39c12'}; color: white; padding: 3px 8px; border-radius: 4px;">${item.status}</span></td>
                            <td style="padding: 10px;">${item.time}</td>`;
                }
                html += '</tr>';
            });
            
            html += `</tbody></table></div>`;
            document.getElementById('reportContent').innerHTML = html;
        }

        function exportCurrentReport() {
            if (!currentReport) {
                alert('يرجى اختيار تقرير أولاً');
                return;
            }
            
            const element = document.getElementById('reportContent');
            const opt = {
                margin: 10,
                filename: `reem-team-${currentReport.type}-report.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Navigation
        function showSection(sectionId, button) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Show selected section
            document.getElementById(sectionId).classList.add('active');
            button.classList.add('active');
        }

        // Logout
        function logout() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                localStorage.removeItem('authToken');
                localStorage.removeItem('currentUser');
                sessionStorage.removeItem('currentUser');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
