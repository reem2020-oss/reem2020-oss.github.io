<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>REEM TIME PRO – Ultra 3D Dashboard</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#020617;
  --bg-soft:#020617;
  --bg-card:#020617;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#7c3aed;
  --accent-soft:#8b5bff;
}
body.light{
  --bg:#f3f4f6;
  --bg-soft:#e5e7eb;
  --bg-card:#ffffff;
  --border:#d1d5db;
  --text:#111827;
  --muted:#6b7280;
  --accent:#7c3aed;
  --accent-soft:#8b5bff;
}
body{
  background:radial-gradient(circle at top,#111827 0,#020617 45%,#000 100%);
  color:var(--text);
  font-family:Arial, Tahoma;
  margin:0;
  transition:background 0.4s ease,color 0.4s ease;
}
a{text-decoration:none;color:inherit}
#login, #app{min-height:100vh;}
.center{
  width:340px;
  margin:120px auto;
  background:linear-gradient(145deg,#020617,#020617,#111827);
  padding:22px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 25px 80px rgba(0,0,0,0.9);
  border:1px solid var(--border);
  transform:translateY(0);
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}
.center:hover{
  transform:translateY(-4px);
  box-shadow:0 35px 90px rgba(0,0,0,1);
}
.center h2{margin-bottom:4px;}
.center p{margin-top:0;margin-bottom:16px;font-size:13px;color:var(--muted);}
.logo{
  font-weight:bold;
  letter-spacing:1px;
  font-size:18px;
}
.logo span{
  color:var(--accent);
}
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:#020617;
  color:var(--text);
  border:1px solid var(--border);
}
body.light input,body.light select{
  background:#f9fafb;
}
button{
  padding:9px 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-soft));
  color:#fff;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
  font-size:13px;
  box-shadow:0 10px 25px rgba(124,58,237,0.5);
  transition:transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
}
button:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 35px rgba(124,58,237,0.7);
  filter:brightness(1.05);
}
button.flat{
  border-radius:10px;
  box-shadow:none;
  background:#111827;
}
button.danger{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  box-shadow:0 10px 25px rgba(239,68,68,0.5);
}
button.secondary{
  background:#111827;
  box-shadow:none;
}
.app-shell{
  display:flex;
  min-height:100vh;
}
.sidebar{
  width:240px;
  background:linear-gradient(180deg,#020617,#020617,#000);
  border-left:1px solid var(--border);
  padding:16px 10px;
  position:sticky;
  top:0;
  height:100vh;
  box-shadow:-10px 0 40px rgba(0,0,0,0.8);
}
.sidebar h3{
  text-align:center;
  margin-top:0;
  margin-bottom:4px;
  font-size:16px;
}
.sidebar small{
  display:block;
  text-align:center;
  color:var(--muted);
  margin-bottom:16px;
  font-size:11px;
}
.menu-item{
  padding:10px 12px;
  margin-bottom:8px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(15,23,42,0.7);
  border:1px solid transparent;
  transition:background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, border 0.2s ease;
}
.menu-item span.icon{font-size:16px;}
.menu-item:hover{
  background:rgba(15,23,42,1);
  transform:translateY(-1px);
  box-shadow:0 10px 25px rgba(0,0,0,0.7);
}
.menu-item.active{
  background:linear-gradient(135deg,var(--accent),var(--accent-soft));
  box-shadow:0 12px 30px rgba(124,58,237,0.7);
  border:1px solid rgba(255,255,255,0.08);
}
.main{
  flex:1;
  padding:20px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  font-size:13px;
  color:var(--muted);
}
.topbar-left strong{color:var(--text);}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:14px;
  margin-bottom:16px;
}
.card{
  background:radial-gradient(circle at top left,#111827 0,var(--bg-card) 45%,#020617 100%);
  border-radius:18px;
  padding:16px;
  border:1px solid var(--border);
  box-shadow:0 22px 60px rgba(0,0,0,0.9);
  transform:translateY(0) translateZ(0);
  transition:transform 0.25s ease, box-shadow 0.25s ease, border 0.25s ease;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 30px 80px rgba(0,0,0,1);
  border-color:rgba(124,58,237,0.6);
}
.card h2,h3{margin-top:0;margin-bottom:8px;font-size:16px;}
.card p{margin:4px 0;font-size:13px;}
.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  background:#111827;
  color:var(--muted);
}
.stat-value{
  font-size:20px;
  font-weight:bold;
  margin-top:4px;
}
.stat-label{
  font-size:11px;
  color:var(--muted);
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:13px;
}
.table th,.table td{
  border-bottom:1px solid #111827;
  padding:6px 4px;
  text-align:right;
}
.table th{color:var(--muted);font-weight:normal;}
small{color:var(--muted);}
pre{
  white-space:pre-wrap;
  font-family:inherit;
  font-size:14px;
  line-height:1.8;
}
.actions-row{
  display:flex;
  gap:8px;
  margin:10px 0;
  flex-wrap:wrap;
}
@media(max-width:900px){
  .app-shell{flex-direction:column;}
  .sidebar{width:100%;height:auto;display:flex;overflow-x:auto;box-shadow:none;border-left:none;border-bottom:1px solid var(--border);}
  .sidebar h3,.sidebar small{display:none;}
  .menu-item{white-space:nowrap;}
}
#notif{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:#16a34a;
  color:#ecfdf5;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  box-shadow:0 15px 40px rgba(22,163,74,0.7);
  opacity:0;
  transition:transform 0.3s ease, opacity 0.3s ease;
  z-index:9999;
}
#notif.error{
  background:#b91c1c;
  box-shadow:0 15px 40px rgba(185,28,28,0.7);
}
#notif.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
  font-size:11px;
}
.calendar-day{
  padding:6px;
  border-radius:8px;
  text-align:center;
  border:1px solid #111827;
  min-height:40px;
}
.calendar-day span.date{
  display:block;
  font-weight:bold;
  margin-bottom:2px;
}
.calendar-day.work{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.6);}
.calendar-day.partial{background:rgba(234,179,8,0.12);border-color:rgba(234,179,8,0.6);}
.calendar-day.absent{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.6);}
.calendar-day.off{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.6);}
.toggle-wrap{
  display:flex;
  align-items:center;
  gap:6px;
}
.toggle-wrap input{
  width:auto;
}
</style>
</head>

<body>

<div id="notif"></div>

<!-- شاشة الدخول -->
<div id="login">
  <div class="center">
    <div class="logo">REEM <span>TIME</span> PRO</div>
    <p>نظام حضور وانصراف أخلاقي – نسخة 3D تجريبية</p>

    <select id="role">
      <option value="admin">مدير النظام (admin)</option>
      <option value="hr">مسؤول الموارد البشرية (hr)</option>
      <option value="user">موظف عادي (user)</option>
    </select>
    <input id="email" placeholder="اسم المستخدم (admin / hr / user)">
    <input id="pass" type="password" placeholder="كلمة المرور (123)">

    <button onclick="login()">دخول</button>
  </div>
</div>

<!-- التطبيق -->
<div id="app" style="display:none">
  <div class="app-shell">
    <div class="sidebar">
      <h3>REEM TIME PRO</h3>
      <small>لوحة تحكم الحضور والانصراف</small>
      <div class="menu-item active" onclick="showPage('dash', this)">
        <span class="icon">🏠</span><span>الرئيسية</span>
      </div>
      <div class="menu-item" onclick="showPage('punch', this)">
        <span class="icon">⏱</span><span>الحضور والانصراف</span>
      </div>
      <div class="menu-item" onclick="showPage('calendar', this)">
        <span class="icon">📆</span><span>تقويم الحضور</span>
      </div>
      <div class="menu-item" onclick="showPage('logs', this)">
        <span class="icon">📋</span><span>سجل الأيام</span>
      </div>
      <div class="menu-item" onclick="showPage('report', this)">
        <span class="icon">📊</span><span>تقرير شهري</span>
      </div>
      <div class="menu-item" onclick="showPage('settings', this)">
        <span class="icon">⚙️</span><span>الإعدادات</span>
      </div>
      <div class="menu-item" onclick="showPage('about', this)">
        <span class="icon">📄</span><span>بيانات النظام</span>
      </div>
      <div class="menu-item" onclick="logout()">
        <span class="icon">🚪</span><span>خروج</span>
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          مرحبًا، <strong id="topUser">admin</strong><br>
          <small id="topRole">مشرف حضور وانصراف – نسخة تجريبية</small>
        </div>
        <div class="topbar-right">
          <div id="now"></div>
        </div>
      </div>
      <div id="page"></div>
    </div>
  </div>
</div>

<script>
// ====== إشعارات ======
function notify(msg, type='ok'){
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = '';
  n.classList.add(type === 'error' ? 'error' : '');
  n.classList.add('show');
  setTimeout(()=>{ n.classList.remove('show'); }, 2200);
}

// ====== وقت حي ======
setInterval(()=>{
  const d = new Date();
  const f = d.toLocaleString('ar-EG',{dateStyle:'medium', timeStyle:'short'});
  const el = document.getElementById('now');
  if(el) el.textContent = f;
},1000);

// ====== USERS / LOGIN ======
const USERS = {
  admin:{user:'admin', pass:'123', role:'admin', label:'مدير النظام'},
  hr:{user:'hr', pass:'123', role:'hr', label:'مسؤول الموارد البشرية'},
  user:{user:'user', pass:'123', role:'user', label:'موظف'}
};

function login(){
  let roleSel = document.getElementById("role").value;
  let u = document.getElementById("email").value.trim();
  let p = document.getElementById("pass").value.trim();

  const target = USERS[roleSel];
  if(!target){
    notify("دور غير معروف", "error");
    return;
  }
  if(u === target.user && p === target.pass){
    localStorage.setItem('reem_logged', JSON.stringify({user:u, role:target.role, label:target.label}));
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("topUser").textContent = u;
    document.getElementById("topRole").textContent = target.label + " – نسخة تجريبية";
    applySettings();
    showPage('dash');
    notify("تم تسجيل الدخول بنجاح");
  } else {
    notify("بيانات الدخول غير صحيحة", "error");
  }
}

function logout(){
  localStorage.removeItem('reem_logged');
  location.reload();
}

// استعادة جلسة
(function restoreSession(){
  const raw = localStorage.getItem('reem_logged');
  if(raw){
    try{
      const s = JSON.parse(raw);
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("topUser").textContent = s.user;
      document.getElementById("topRole").textContent = s.label || "مستخدم";
      applySettings();
      showPage('dash');
    }catch(e){}
  }
})();

// ====== DATA STRUCTURE ======
function getAllDays(){
  const raw = localStorage.getItem('reem_days');
  return raw ? JSON.parse(raw) : {};
}
function saveAllDays(data){
  localStorage.setItem('reem_days', JSON.stringify(data));
}
function getTodayKey(){
  return new Date().toISOString().slice(0,10);
}
function getTodayLogs(){
  const all = getAllDays();
  const k = getTodayKey();
  return all[k] || {checkIn:null, checkOut:null, totalMinutes:0};
}
function saveTodayLogs(logs){
  const all = getAllDays();
  const k = getTodayKey();
  all[k] = logs;
  saveAllDays(all);
}

// ====== ROUTER ======
function showPage(p, el){
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  if(el) el.classList.add('active');

  if(p === 'dash') renderDash();
  if(p === 'punch') renderPunch();
  if(p === 'calendar') renderCalendar();
  if(p === 'logs') renderLogs();
  if(p === 'report') renderReport();
  if(p === 'settings') renderSettings();
  if(p === 'about') renderAbout();
}

// ====== STATS ======
function calcStats(){
  const all = getAllDays();
  const keys = Object.keys(all);
  const todayKey = getTodayKey();
  let totalMinutes = 0;
  let daysWithWork = 0;
  let lastDay = null;

  keys.forEach(k=>{
    const d = all[k];
    if(d.totalMinutes && d.totalMinutes>0){
      totalMinutes += d.totalMinutes;
      daysWithWork++;
      if(!lastDay || k > lastDay) lastDay = k;
    }
  });

  const totalHours = (totalMinutes/60).toFixed(2);
  const today = all[todayKey] || {checkIn:null, checkOut:null, totalMinutes:0};
  let todayStatus = 'لم يتم تسجيل حضور اليوم';
  if(today.checkIn && !today.checkOut) todayStatus = 'تم تسجيل حضور – في انتظار الانصراف';
  if(today.checkIn && today.checkOut) todayStatus = 'تم تسجيل حضور وانصراف اليوم';

  return {
    totalHours,
    daysWithWork,
    todayStatus,
    lastDay
  };
}

// ====== DASHBOARD ======
function renderDash(){
  const stats = calcStats();
  const today = getTodayLogs();

  let lastDayText = stats.lastDay
    ? new Date(stats.lastDay).toLocaleDateString('ar-EG',{dateStyle:'medium'})
    : 'لا يوجد';

  let todayHours = '';
  if(today.totalMinutes && today.totalMinutes>0){
    todayHours = (today.totalMinutes/60).toFixed(2) + ' ساعة';
  } else {
    todayHours = '—';
  }

  document.getElementById('page').innerHTML = `
    <div class="cards">
      <div class="card">
        <span class="badge">اليوم</span>
        <h3>حالة اليوم</h3>
        <p>${new Date().toLocaleDateString('ar-EG',{dateStyle:'full'})}</p>
        <p><strong>${stats.todayStatus}</strong></p>
        <p class="stat-label">ساعات اليوم</p>
        <div class="stat-value">${todayHours}</div>
      </div>
      <div class="card">
        <span class="badge">إحصائيات</span>
        <h3>إجمالي الساعات</h3>
        <div class="stat-value">${stats.totalHours}</div>
        <div class="stat-label">إجمالي الساعات المسجلة في النظام</div>
        <p style="margin-top:8px;"><strong>أيام العمل:</strong> ${stats.daysWithWork}</p>
      </div>
      <div class="card">
        <span class="badge">آخر تسجيل</span>
        <h3>آخر يوم مسجل</h3>
        <div class="stat-value">${lastDayText}</div>
        <div class="stat-label">آخر يوم تم تسجيل الحضور والانصراف فيه</div>
      </div>
    </div>

    <div class="card">
      <h3>نظرة عامة</h3>
      <p>هذا النظام يوفر لوحة تحكم احترافية لإدارة الحضور والانصراف، مع حفظ البيانات في المتصفح (localStorage) بدون الحاجة إلى خادم أو قاعدة بيانات خارجية.</p>
      <p>يمكنك استخدام صفحة <strong>"الحضور والانصراف"</strong> لتسجيل بداية ونهاية اليوم، وصفحة <strong>"تقويم الحضور"</strong> لمراجعة حالة كل يوم في الشهر، وصفحة <strong>"سجل الأيام"</strong> لمراجعة جميع الأيام المسجلة، وصفحة <strong>"تقرير شهري"</strong> لمراجعة إجمالي الساعات.</p>
    </div>
  `;
}

// ====== PUNCH IN/OUT ======
function renderPunch(){
  const logs = getTodayLogs();
  let info = '';

  if(logs.checkIn){
    info += `<p>🟢 وقت الحضور: ${new Date(logs.checkIn).toLocaleTimeString('ar-EG',{timeStyle:'short'})}</p>`;
  } else {
    info += `<p>لم يتم تسجيل حضور بعد.</p>`;
  }

  if(logs.checkOut){
    info += `<p>🔴 وقت الانصراف: ${new Date(logs.checkOut).toLocaleTimeString('ar-EG',{timeStyle:'short'})}</p>`;
    const h = (logs.totalMinutes/60).toFixed(2);
    info += `<p><strong>إجمالي الساعات:</strong> ${h} ساعة</p>`;
  }

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h3>الحضور والانصراف</h3>
      <p>قم بتسجيل الحضور عند بداية العمل، والانصراف عند نهاية اليوم. يتم حفظ بيانات كل يوم تلقائيًا.</p>
      <div class="actions-row">
        <button onclick="doCheckIn()">📍 تسجيل حضور</button>
        <button class="danger" onclick="doCheckOut()">📍 تسجيل انصراف</button>
        <button class="secondary" onclick="clearToday()">مسح بيانات اليوم</button>
      </div>
      <div id="punchInfo">${info}</div>
      <small>يتم حفظ بيانات اليوم في المتصفح (localStorage) ويمكن مراجعتها من صفحة "سجل الأيام" و"تقويم الحضور".</small>
    </div>
  `;
}

function doCheckIn(){
  const logs = getTodayLogs();
  if(logs.checkIn){
    notify("تم تسجيل الحضور بالفعل اليوم","error");
    return;
  }
  logs.checkIn = new Date().toISOString();
  saveTodayLogs(logs);
  notify("تم تسجيل الحضور بنجاح");
  renderPunch();
}

function doCheckOut(){
  const logs = getTodayLogs();
  if(!logs.checkIn){
    notify("لا يمكن تسجيل الانصراف قبل الحضور","error");
    return;
  }
  if(logs.checkOut){
    notify("تم تسجيل الانصراف بالفعل اليوم","error");
    return;
  }
  logs.checkOut = new Date().toISOString();
  const start = new Date(logs.checkIn);
  const end   = new Date(logs.checkOut);
  const diffMinutes = Math.round((end - start) / 60000);
  logs.totalMinutes = diffMinutes;
  saveTodayLogs(logs);
  notify("تم تسجيل الانصراف وحساب الساعات");
  renderPunch();
}

function clearToday(){
  if(!confirm("هل تريد مسح بيانات اليوم؟")) return;
  const all = getAllDays();
  const k = getTodayKey();
  delete all[k];
  saveAllDays(all);
  notify("تم مسح بيانات اليوم");
  renderPunch();
}

// ====== LOGS PAGE ======
function renderLogs(){
  const all = getAllDays();
  const keys = Object.keys(all).sort();
  let rows = '';

  if(keys.length === 0){
    rows = `<tr><td colspan="4">لا توجد بيانات مسجلة حتى الآن.</td></tr>`;
  } else {
    keys.forEach(k=>{
      const d = all[k];
      const ci = d.checkIn ? new Date(d.checkIn).toLocaleTimeString('ar-EG',{timeStyle:'short'}) : '-';
      const co = d.checkOut ? new Date(d.checkOut).toLocaleTimeString('ar-EG',{timeStyle:'short'}) : '-';
      const h  = d.totalMinutes ? (d.totalMinutes/60).toFixed(2) : '-';
      rows += `
        <tr>
          <td>${new Date(k).toLocaleDateString('ar-EG',{dateStyle:'medium'})}</td>
          <td>${ci}</td>
          <td>${co}</td>
          <td>${h}</td>
        </tr>
      `;
    });
  }

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h3>سجل الأيام</h3>
      <p>عرض جميع الأيام التي تم تسجيل حضور أو انصراف فيها.</p>
      <table class="table">
        <thead>
          <tr>
            <th>اليوم</th>
            <th>وقت الحضور</th>
            <th>وقت الانصراف</th>
            <th>إجمالي الساعات</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
      <small>يمكنك مسح بيانات المتصفح يدويًا من إعدادات المتصفح لإعادة ضبط السجل بالكامل.</small>
    </div>
  `;
}

// ====== MONTHLY REPORT ======
function renderReport(){
  const all = getAllDays();
  const keys = Object.keys(all).sort();
  if(keys.length === 0){
    document.getElementById('page').innerHTML = `
      <div class="card">
        <h3>تقرير شهري</h3>
        <p>لا توجد بيانات كافية لإنشاء تقرير.</p>
      </div>
    `;
    return;
  }

  const now = new Date();
  const ym = now.toISOString().slice(0,7); // YYYY-MM
  let totalMinutes = 0;
  let daysCount = 0;

  keys.forEach(k=>{
    if(k.startsWith(ym)){
      const d = all[k];
      if(d.totalMinutes && d.totalMinutes>0){
        totalMinutes += d.totalMinutes;
        daysCount++;
      }
    }
  });

  const totalHours = (totalMinutes/60).toFixed(2);

  document.getElementById('page').innerHTML = `
    <div class="card" id="reportCard">
      <h3>تقرير شهر ${now.toLocaleDateString('ar-EG',{month:'long', year:'numeric'})}</h3>
      <p><strong>إجمالي الساعات المسجلة:</strong> ${totalHours} ساعة</p>
      <p><strong>عدد أيام العمل:</strong> ${daysCount} يوم</p>
      <div class="actions-row">
        <button onclick="printReport()">🖨 طباعة / حفظ PDF</button>
      </div>
      <small>يمكنك استخدام خيار الطباعة في المتصفح لحفظ التقرير كملف PDF.</small>
    </div>
  `;
}

function printReport(){
  notify("استخدم نافذة الطباعة لحفظ التقرير كـ PDF");
  window.print();
}

// ====== CALENDAR VIEW ======
function renderCalendar(){
  const all = getAllDays();
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth(); // 0-11
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  const startWeekDay = (firstDay.getDay()+6)%7; // تحويل الأحد لآخر
  const daysInMonth = lastDay.getDate();

  let cells = '';
  const ym = now.toISOString().slice(0,7);

  for(let i=0;i<startWeekDay;i++){
    cells += `<div class="calendar-day"></div>`;
  }

  for(let d=1; d<=daysInMonth; d++){
    const dayKey = `${ym}-${String(d).padStart(2,'0')}`;
    const rec = all[dayKey];
    let cls = '';
    let label = 'لا بيانات';

    if(rec){
      if(rec.checkIn && rec.checkOut && rec.totalMinutes>0){
        cls = 'work';
        label = 'حضور كامل';
      }else if(rec.checkIn && !rec.checkOut){
        cls = 'partial';
        label = 'حضور فقط';
      }
    }else{
      // نعتبر الجمعة عطلة (اختياري)
      const tmp = new Date(year, month, d);
      const wd = tmp.getDay(); // 0=أحد
      if(wd === 5){ // جمعة
        cls = 'off';
        label = 'عطلة';
      }else{
        cls = 'absent';
        label = 'غياب';
      }
    }

    cells += `
      <div class="calendar-day ${cls}">
        <span class="date">${d}</span>
        <span>${label}</span>
      </div>
    `;
  }

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h3>تقويم الحضور – ${now.toLocaleDateString('ar-EG',{month:'long', year:'numeric'})}</h3>
      <p>عرض حالة كل يوم في الشهر الحالي (حضور كامل، حضور فقط، غياب، عطلة).</p>
      <div class="calendar-grid">
        ${cells}
      </div>
      <small>يتم تحديد العطلة افتراضيًا يوم الجمعة، ويمكن تعديل المنطق لاحقًا حسب سياسة العمل.</small>
    </div>
  `;
}

// ====== SETTINGS ======
function getSettings(){
  const raw = localStorage.getItem('reem_settings');
  return raw ? JSON.parse(raw) : {theme:'dark', displayName:'REEM TIME PRO'};
}
function saveSettings(s){
  localStorage.setItem('reem_settings', JSON.stringify(s));
}
function applySettings(){
  const s = getSettings();
  document.body.classList.toggle('light', s.theme === 'light');
}

function renderSettings(){
  const s = getSettings();
  document.getElementById('page').innerHTML = `
    <div class="card">
      <h3>الإعدادات</h3>
      <p>تخصيص مظهر النظام وبعض الإعدادات العامة.</p>
      <div style="margin-top:10px;">
        <label>اسم العرض للنظام:</label>
        <input id="setName" value="${s.displayName}">
      </div>
      <div style="margin-top:10px;" class="toggle-wrap">
        <input type="checkbox" id="setTheme" ${s.theme === 'light' ? 'checked' : ''}>
        <label for="setTheme">تفعيل الوضع الفاتح (Light Mode)</label>
      </div>
      <div class="actions-row" style="margin-top:12px;">
        <button onclick="saveSettingsUI()">💾 حفظ الإعدادات</button>
      </div>
      <small>يتم حفظ الإعدادات في المتصفح، وتُطبق تلقائيًا عند فتح النظام مرة أخرى.</small>
    </div>
  `;
}

function saveSettingsUI(){
  const name = document.getElementById('setName').value.trim() || 'REEM TIME PRO';
  const theme = document.getElementById('setTheme').checked ? 'light' : 'dark';
  const s = {displayName:name, theme};
  saveSettings(s);
  applySettings();
  notify("تم حفظ الإعدادات");
}
