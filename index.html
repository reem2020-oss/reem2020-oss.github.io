<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reem ERP Pro | النظام المتكامل</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --danger: #ef4444; --success: #22c55e; --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #020617; border-left: 1px solid #1e293b; padding: 20px; position: fixed; height: 100vh; right: 0; transition: 0.3s; }
        .nav-item { padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; display: flex; align-items: center; gap: 10px; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main { flex: 1; margin-right: 260px; padding: 30px; width: calc(100% - 260px); }
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tables & UI */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); }

        @media (max-width: 768px) { .sidebar { width: 0; overflow: hidden; padding: 0; } .main { margin-right: 0; width: 100%; } }
    </style>
</head>
<body>

<!-- صفحة تسجيل الدخول -->
<div id="auth-screen">
    <div class="login-card">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Reem Pro | دخول</h2>
        <input type="text" id="user-input" placeholder="اسم المستخدم">
        <input type="password" id="pass-input" placeholder="كلمة المرور">
        <button class="btn" style="width: 100%; margin-top: 20px;" onclick="login()">دخول للنظام</button>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <h2 style="color: var(--primary); margin-bottom: 30px; text-align: center;">Reem ERP</h2>
    <div id="menu-content"></div>
    <button class="btn btn-danger" style="width: 100%; margin-top: 40px;" onclick="location.reload()">تسجيل خروج</button>
</aside>

<main class="main">
    <div id="content-area"></div>
</main>

<script>
    // بيانات النظام (تخزن في المتصفح)
    let db = JSON.parse(localStorage.getItem('reem_db')) || {
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام"}],
        attendance: [],
        tasks: []
    };

    let loggedInUser = null;

    function saveDB() { localStorage.setItem('reem_db', JSON.stringify(db)); }

    function login() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;
        const user = db.users.find(x => x.user === u && x.pass === p);

        if (user) {
            loggedInUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            renderUI();
        } else {
            alert("بيانات الدخول غير صحيحة!");
        }
    }

    function renderUI() {
        const menu = document.getElementById('menu-content');
        if (loggedInUser.role === 'admin') {
            menu.innerHTML = `
                <div class="nav-item active" onclick="show('admin-dash')"><i class="fas fa-chart-pie"></i> لوحة التحكم</div>
                <div class="nav-item" onclick="show('manage-users')"><i class="fas fa-users-cog"></i> إدارة الموظفين</div>
                <div class="nav-item" onclick="show('all-attendance')"><i class="fas fa-fingerprint"></i> سجل الحضور العام</div>
                <div class="nav-item" onclick="show('admin-tasks')"><i class="fas fa-tasks"></i> إدارة المهام</div>
            `;
            renderAdminDash();
        } else {
            menu.innerHTML = `
                <div class="nav-item active" onclick="show('emp-dash')"><i class="fas fa-user"></i> صفحتي الشخصية</div>
                <div class="nav-item" onclick="show('emp-tasks')"><i class="fas fa-list"></i> مهامي الوظيفية</div>
            `;
            renderEmpDash();
        }
    }

    // --- وظائف المدير ---
    function renderAdminDash() {
        document.getElementById('content-area').innerHTML = `
            <div id="admin-dash" class="section active">
                <h1 style="margin-bottom:20px">مرحباً ${loggedInUser.name}</h1>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px">
                    <div class="card"><h4>إجمالي الموظفين</h4><h2>${db.users.length - 1}</h2></div>
                    <div class="card"><h4>البصمات اليوم</h4><h2>${db.attendance.length}</h2></div>
                </div>
            </div>
            
            <div id="manage-users" class="section">
                <div class="card">
                    <h3>إضافة موظف جديد</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:10px; margin-top:10px">
                        <input id="new-name" placeholder="الاسم الكامل">
                        <input id="new-user" placeholder="اسم المستخدم">
                        <input id="new-pass" placeholder="كلمة المرور">
                        <button class="btn" onclick="addUser()">إضافة</button>
                    </div>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>الاسم</th><th>المستخدم</th><th>كلمة المرور</th><th>إجراء</th></tr></thead>
                        <tbody id="users-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="all-attendance" class="section">
                <div class="card"><h3>سجل الحضور الكامل</h3><table id="full-att-table"><thead><tr><th>الموظف</th><th>النوع</th><th>الوقت</th></tr></thead><tbody></tbody></table></div>
            </div>
        `;
        updateUsersList();
        updateFullAttendance();
    }

    function addUser() {
        const name = document.getElementById('new-name').value;
        const user = document.getElementById('new-user').value;
        const pass = document.getElementById('new-pass').value;
        if(!name || !user || !pass) return;
        db.users.push({name, user, pass, role: 'emp'});
        saveDB(); updateUsersList();
        alert("تمت إضافة الموظف بنجاح");
    }

    function updateUsersList() {
        const list = document.getElementById('users-list');
        if(!list) return;
        list.innerHTML = db.users.filter(u => u.role !== 'admin').map((u, i) => `
            <tr><td>${u.name}</td><td>${u.user}</td><td>${u.pass}</td>
            <td><button class="btn btn-danger" onclick="deleteUser(${i+1})">حذف</button></td></tr>
        `).join('');
    }

    function deleteUser(index) { if(confirm("حذف الموظف؟")) { db.users.splice(index, 1); saveDB(); updateUsersList(); } }

    // --- وظائف الموظف ---
    function renderEmpDash() {
        document.getElementById('content-area').innerHTML = `
            <div id="emp-dash" class="section active">
                <div class="card" style="text-align:center">
                    <h2>أهلاً ${loggedInUser.name}</h2>
                    <p style="margin:15px 0">سجل حضورك الآن عبر الموقع الجغرافي</p>
                    <button class="btn" style="width:100%; height:60px; font-size:1.2rem" onclick="empLog('دخول')">إثبات حضور</button>
                </div>
                <div class="card"><h3>سجلي اليوم</h3><table id="my-att-table"></table></div>
            </div>
        `;
        updateMyAttendance();
    }

    function empLog(type) {
        const time = new Date().toLocaleString('ar-SA');
        db.attendance.push({name: loggedInUser.name, type, time});
        saveDB();
        alert("تم تسجيل حضورك بنجاح");
        updateMyAttendance();
    }

    function updateMyAttendance() {
        const table = document.getElementById('my-att-table');
        if(!table) return;
        const myData = db.attendance.filter(a => a.name === loggedInUser.name);
        table.innerHTML = myData.map(a => `<tr><td>${a.type}</td><td>${a.time}</td></tr>`).join('');
    }

    function updateFullAttendance() {
        const table = document.getElementById('full-att-table')?.querySelector('tbody');
        if(!table) return;
        table.innerHTML = db.attendance.map(a => `<tr><td>${a.name}</td><td>${a.type}</td><td>${a.time}</td></tr>`).join('');
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        updateFullAttendance();
    }
</script>

</body>
</html>
