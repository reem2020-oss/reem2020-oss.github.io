<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">REEM ERP Pro</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        :root { --gold: #d4af37; --dark: #020c1b; --glass: rgba(16, 33, 65, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at top right, #0a192f, #020c1b); color: #e6f1ff; min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .sidebar { width: 260px; background: rgba(0,0,0,0.95); border-left: 1px solid var(--gold); height: 100vh; position: fixed; right: 0; padding: 20px; display: flex; flex-direction: column; z-index: 1000; }
        .main-content { margin-right: 260px; padding: 30px; width: calc(100% - 260px); }

        .company-logo-container { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .company-logo-container img { max-width: 80px; border-radius: 12px; filter: drop-shadow(0 0 5px var(--gold)); }

        .glass-card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #b38f2d); color: #000; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        
        .nav-link { padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; color: #ccc; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-right: 3px solid var(--gold); }
        
        input, select { width: 100%; padding: 11px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: white; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--gold); padding: 12px; text-align: right; border-bottom: 2px solid var(--gold); font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; background: rgba(212, 175, 55, 0.2); color: var(--gold); }
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; } .main-content { margin-right: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="glass-card" style="width: 380px; text-align: center; border: 2px solid var(--gold);">
        <img id="login-logo" src="https://flaticon.com" style="width: 80px; margin-bottom: 20px;">
        <h2 id="login-comp-name" style="color: var(--gold); margin-bottom: 20px;">نظام REEM المطور</h2>
        <input type="text" id="u_in" placeholder="اسم المستخدم">
        <input type="password" id="p_in" placeholder="كلمة المرور">
        <button class="btn-gold" style="width: 100%; justify-content: center;" onclick="login()">دخول للنظام</button>
    </div>
</div>

<aside class="sidebar">
    <div class="company-logo-container">
        <img id="side-logo" src="https://flaticon.com">
        <h3 id="side-comp-name" style="color: var(--gold); margin-top: 10px; font-size: 16px;">اسم الشركة</h3>
    </div>
    <div id="nav-links"></div>
    <button class="btn-gold" style="margin-top: auto; background: #96281b; color: white;" onclick="location.reload()">
        <i class="fas fa-sign-out-alt"></i> خروج
    </button>
</aside>

<main class="main-content">
    <header class="glass-card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;">
        <div id="clock" style="font-size: 18px; color: var(--gold); font-weight: bold;"></div>
        <div id="user-display" style="font-weight: bold; color: var(--gold);"></div>
    </header>
    <div id="view-area"></div>
</main>

<script>
    // --- قاعدة بيانات SaaS مطورة ---
    const DB_KEY = 'REEM_SAAS_V12';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
        settings: { 
            name: "شركة ريم العالمية", 
            currency: "EGP", 
            logo: "https://flaticon.com" 
        },
        depts: ["الإدارة", "الميدان", "المبيعات"],
        users: [{user: "admin", pass: "123", role: "admin", name: "المدير العام", dept: "الإدارة", sal: 0}],
        logs: []
    };

    function sync() { 
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        updateBranding();
    }

    function updateBranding() {
        document.getElementById('side-comp-name').innerText = db.settings.name;
        document.getElementById('login-comp-name').innerText = db.settings.name;
        document.getElementById('side-logo').src = db.settings.logo;
        document.getElementById('login-logo').src = db.settings.logo;
        document.getElementById('tab-title').innerText = db.settings.name + " | ERP";
    }

    // --- نظام الدخول ---
    let session = null;
    function login() {
        const u = document.getElementById('u_in').value.trim();
        const p = document.getElementById('p_in').value.trim();
        const found = db.users.find(x => x.user === u && x.pass === p);
        if(found) {
            session = found;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-display').innerHTML = `<i class="fas fa-user-circle"></i> ${session.name}`;
            renderNav(); loadView(session.role === 'admin' ? 'dash' : 'punch');
            updateBranding();
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
        } else alert("بيانات خاطئة!");
    }

    function renderNav() {
        const nav = document.getElementById('nav-links');
        const links = session.role === 'admin' ? 
            [{id:'dash', i:'fa-home', n:'الرئيسية'}, {id:'hr', i:'fa-users-gear', n:'إدارة الموظفين'}, {id:'track', i:'fa-map-location-dot', n:'التتبع الميداني'}, {id:'settings', i:'fa-cogs', n:'إعدادات الشركة'}] :
            [{id:'punch', i:'fa-fingerprint', n:'بصمة GPS'}, {id:'report', i:'fa-paper-plane', n:'تقرير اليوم'}];
        nav.innerHTML = links.map(l => `<div class="nav-link" onclick="loadView('${l.id}')"><i class="fas ${l.i}"></i> ${l.n}</div>`).join('');
    }

    // --- الصفحات الرئيسية ---
    function loadView(v) {
        const area = document.getElementById('view-area');
        area.innerHTML = ""; // Clear

        if(v === 'dash') {
            area.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                    <div class="glass-card"><h4>الموظفين</h4><h2>${db.users.length}</h2></div>
                    <div class="glass-card"><h4>أقسام العمل</h4><h2>${db.depts.length}</h2></div>
                    <div class="glass-card"><h4>حضور اليوم</h4><h2>${db.logs.filter(l=>l.date===new Date().toLocaleDateString()).length}</h2></div>
                </div>
                <div class="glass-card"><canvas id="chart"></canvas></div>`;
        } 
        
        else if(v === 'hr') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>إدارة الأقسام</h3>
                    <div style="display:flex; gap:10px;">
                        <input id="dept_in" placeholder="اسم القسم الجديد">
                        <button class="btn-gold" onclick="addDept()">إضافة</button>
                    </div>
                    <div style="margin-top:10px;">${db.depts.map((d,i)=>`<span class="badge">${d} <i class="fas fa-times" onclick="delDept(${i})" style="cursor:pointer"></i></span>`).join(' ')}</div>
                </div>
                <div class="glass-card">
                    <h3>إضافة / تعديل موظف</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input id="n_name" placeholder="الاسم الكامل"> <input id="n_user" placeholder="يوزر الدخول">
                        <input id="n_pass" placeholder="كلمة المرور"> <input id="n_sal" placeholder="الراتب الشهري">
                        <select id="n_dept">${db.depts.map(d=>`<option>${d}</option>`).join('')}</select>
                        <button class="btn-gold" onclick="saveEmployee()">حفظ البيانات</button>
                    </div>
                </div>
                <div class="glass-card">
                    <table>
                        <thead><tr><th>الموظف</th><th>القسم</th><th>الراتب (${db.settings.currency})</th><th>إجراءات</th></tr></thead>
                        <tbody>${db.users.map((u,i)=>`<tr><td>${u.name}</td><td>${u.dept}</td><td>${u.sal}</td>
                            <td>
                                <button onclick="editEmp(${i})" class="btn-gold" style="padding:5px 8px; background:#2980b9; color:white;"><i class="fas fa-edit"></i></button>
                                ${u.role!=='admin'?`<button onclick="delEmp(${i})" class="btn-gold" style="padding:5px 8px; background:#c0392b; color:white;"><i class="fas fa-trash"></i></button>`:''}
                            </td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
        }

        else if(v === 'settings') {
            area.innerHTML = `
                <div class="glass-card">
                    <h3>إعدادات نسخة البرنامج</h3>
                    <label>اسم الشركة / العميل</label> <input id="s_name" value="${db.settings.name}">
                    <label>العملة المستخدمة</label> <input id="s_cur" value="${db.settings.currency}">
                    <label>رابط اللوجو (صورة مستطيلة أو دائرية)</label> <input id="s_logo" value="${db.settings.logo}">
                    <button class="btn-gold" onclick="saveSettings()" style="margin-top:15px; width:100%; justify-content:center;">تحديث هوية البرنامج</button>
                </div>`;
        }

        else if(v === 'punch') {
            area.innerHTML = `
                <div class="glass-card" style="text-align:center;">
                    <i class="fas fa-location-dot" style="font-size:70px; color:var(--gold); margin-bottom:20px;"></i>
                    <h2>نظام تحديد المواقع الميداني</h2>
                    <button class="btn-gold" style="width:220px; margin-top:20px;" onclick="doGPS()">بصمة حضور (GPS)</button>
                </div>`;
        }
    }

    // --- وظائف التحكم ---
    function addDept() {
        const d = document.getElementById('dept_in').value;
        if(d) { db.depts.push(d); sync(); loadView('hr'); }
    }
    function delDept(i) { db.depts.splice(i,1); sync(); loadView('hr'); }

    function saveEmployee() {
        const u = { name: document.getElementById('n_name').value, user: document.getElementById('n_user').value, pass: document.getElementById('n_pass').value, sal: document.getElementById('n_sal').value, dept: document.getElementById('n_dept').value, role: 'user' };
        db.users.push(u); sync(); loadView('hr');
    }

    function delEmp(i) { if(confirm("حذف الموظف نهائياً؟")) { db.users.splice(i,1); sync(); loadView('hr'); } }

    function saveSettings() {
        db.settings.name = document.getElementById('s_name').value;
        db.settings.currency = document.getElementById('s_cur').value;
        db.settings.logo = document.getElementById('s_logo').value;
        sync(); alert("تم تحديث بيانات الشركة بنجاح!");
    }

    function doGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            db.logs.push({ user: session.name, lat: p.coords.latitude, lng: p.coords.longitude, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() });
            sync(); alert("تم تسجيل موقعك بنجاح");
        });
    }

    // تهيئة البيانات عند التشغيل
    updateBranding();
</script>
</body>
</html>
