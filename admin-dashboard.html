<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 { margin-bottom: 20px; }

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 15px;
    background: #0a7ea4;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: right;
}
</style>
</head>

<body>

<h1>نظام الحضور - إدارة الموظفين</h1>

<!-- إضافة موظف -->
<div>
    <input type="text" id="name" placeholder="الاسم">
    <input type="email" id="email" placeholder="البريد">
    <input type="text" id="department" placeholder="القسم">
    <input type="text" id="job" placeholder="الوظيفة">
    <input type="number" id="salary" placeholder="الراتب">

    <button onclick="addEmployee()">إضافة</button>
</div>

<!-- جدول -->
<table>
    <thead>
        <tr>
            <th>الاسم</th>
            <th>البريد</th>
            <th>القسم</th>
            <th>الوظيفة</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>

// ⚠️ مهم: حط هنا رابط السيرفر بتاعك
const API = "http://localhost:3000/api/employees";

// تحميل الموظفين
function loadEmployees() {
    fetch(API)
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById("table");
        table.innerHTML = "";

        data.forEach(emp => {
            table.innerHTML += `
                <tr>
                    <td>${emp.name}</td>
                    <td>${emp.email}</td>
                    <td>${emp.department}</td>
                    <td>${emp.job}</td>
                </tr>
            `;
        });
    });
}

// إضافة موظف
function addEmployee() {
    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        department: document.getElementById("department").value,
        job: document.getElementById("job").value,
        salary: document.getElementById("salary").value
    };

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("تمت الإضافة");
        loadEmployees();
    });
}

// تشغيل
loadEmployees();

</script>

</body>
</html>
